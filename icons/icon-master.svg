<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#0C0C0D"/>
    </radialGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D9FF33"/>
      <stop offset="100%" stop-color="#A8D900"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners (handled by mask for iOS) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Dumbbell icon centered -->
  <g transform="translate(256 256)">
    <!-- Left weight -->
    <rect x="-180" y="-50" width="36" height="100" rx="6" fill="url(#lime)"/>
    <rect x="-144" y="-32" width="20" height="64" rx="4" fill="url(#lime)"/>
    <!-- Bar -->
    <rect x="-124" y="-12" width="248" height="24" rx="4" fill="url(#lime)"/>
    <!-- Right weight -->
    <rect x="124" y="-32" width="20" height="64" rx="4" fill="url(#lime)"/>
    <rect x="144" y="-50" width="36" height="100" rx="6" fill="url(#lime)"/>
  </g>

  <!-- Accent line bottom -->
  <rect x="156" y="430" width="200" height="4" rx="2" fill="#C8FF00" opacity="0.4"/>
</svg>
