/* ── TimeRangeNav: pill periodo (1s/1m/3m/6m/1a) + frecce per scorrere finestra ── */
function TimeRangeNav(p){
  var rangeKey = p.rangeKey, offset = p.offset;
  var setRangeKey = p.setRangeKey, setOffset = p.setOffset;
  var earliestMs = p.earliestMs || 0;
  var w = getCalendarWindow(rangeKey, offset);
  var label = formatCalendarLabel(rangeKey, w);
  var canPrev = !earliestMs || w.start.getTime() > earliestMs;
  var canNext = offset > 0;
  var arrowBtn = function(dir, enabled, onClick){
    return h('button',{
      onClick: enabled ? onClick : undefined,
      disabled: !enabled,
      'aria-label': dir==='prev' ? 'Periodo precedente' : 'Periodo successivo',
      style:{background:'transparent',border:'none',color:enabled?ACC:MUTED,cursor:enabled?'pointer':'not-allowed',padding:'4px 12px',fontSize:22,fontWeight:700,opacity:enabled?1:0.3,lineHeight:1,fontFamily:"'Barlow Condensed',sans-serif"}
    }, dir==='prev' ? '‹' : '›');
  };
  return h('div',{style:{marginBottom:14}},
    h('div',{style:{display:'flex',gap:5,marginBottom:8,overflowX:'auto',WebkitOverflowScrolling:'touch'}},
      TIME_RANGES.map(function(r){
        var on = rangeKey === r.k;
        return h('button',{
          key:r.k,
          onClick:function(){hap(6); setRangeKey(r.k); setOffset(0);},
          'aria-pressed':on,
          style:{flexShrink:0,padding:'6px 12px',borderRadius:18,border:'1px solid '+(on?ACC:BORD),background:on?ACC2:'transparent',color:on?ACC:MUTED,fontSize:11,cursor:'pointer',fontWeight:on?700:500,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.04em',textTransform:'uppercase'}
        }, r.short);
      })
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:4,background:SURF2,borderRadius:10,padding:'4px 4px',border:'0.5px solid '+BORD}},
      arrowBtn('prev', canPrev, function(){hap(6); setOffset(offset+1);}),
      h('div',{style:{flex:1,textAlign:'center',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:TEXT,fontSize:13,padding:'4px 0',userSelect:'none'}}, label),
      arrowBtn('next', canNext, function(){hap(6); setOffset(offset-1);})
    )
  );
}

/* ── stats ── */
function Stats(p){
  var sessions=p.sessions,go=p.go;
  var _tab=useState('train');var tab=_tab[0];var setTab=_tab[1];
  /* Selettore periodo condiviso tra le tre tab — finestre calendar-anchored con frecce ‹ › */
  var _rk=useState('1m');var rangeKey=_rk[0];var setRangeKey=_rk[1];
  var _ro=useState(0);var rangeOffset=_ro[0];var setRangeOffset=_ro[1];
  var _2=useState(null);var sel=_2[0];var setSel=_2[1];
  /* Misure corporee (per il pannello "Corpo") */
  var _bm=useState(loadBodyLog());var bodyLog=_bm[0];var setBodyLog=_bm[1];

  /* Data più vecchia disponibile — disabilita la freccia "indietro" oltre */
  var earliestMs = 0;
  if(sessions.length){
    earliestMs = Math.min.apply(null, sessions.map(function(s){return new Date(s.t0).getTime();}));
  }
  if(bodyLog.length){
    var bodyEarliest = Math.min.apply(null, bodyLog.map(function(r){return new Date(r.t).getTime();}));
    earliestMs = earliestMs ? Math.min(earliestMs, bodyEarliest) : bodyEarliest;
  }

  if(tab==='adherence'){
    return h('div',{style:{padding:'24px 16px 100px'}},
      h(PageHeader,{title:'Statistiche'}),
      h(StatsTabs,{tab:tab,setTab:setTab}),
      h(TimeRangeNav,{rangeKey:rangeKey,offset:rangeOffset,setRangeKey:setRangeKey,setOffset:setRangeOffset,earliestMs:earliestMs}),
      h(AdherenceView,{sessions:sessions,profile:p.profile,rangeKey:rangeKey,rangeOffset:rangeOffset})
    );
  }
  if(tab==='body'){
    return h('div',{style:{padding:'24px 16px 100px'}},
      h(PageHeader,{title:'Statistiche'}),
      h(StatsTabs,{tab:tab,setTab:setTab}),
      h(TimeRangeNav,{rangeKey:rangeKey,offset:rangeOffset,setRangeKey:setRangeKey,setOffset:setRangeOffset,earliestMs:earliestMs}),
      h(BodyView,{log:bodyLog,setLog:setBodyLog,profile:p.profile,setProfile:p.setProfile,rangeKey:rangeKey,rangeOffset:rangeOffset})
    );
  }
  /* Finestra corrente + finestra precedente di pari ampiezza per i delta */
  var winNow  = getCalendarWindow(rangeKey, rangeOffset);
  var winPrev = getCalendarWindow(rangeKey, rangeOffset+1);
  var startMs = winNow.start.getTime(), endMs = winNow.end.getTime();
  var prevStartMs = winPrev.start.getTime(), prevEndMs = winPrev.end.getTime();
  var rangeDays = Math.max(1, Math.round((endMs - startMs) / 86400000));
  function inWin(s, sMs, eMs){var t = new Date(s.t0).getTime(); return t>=sMs && t<=eMs;}
  /* Per top esercizi e tonnellaggio escludiamo cardio (semantica diversa: durata/kcal vs peso/reps).
     Ma per KPI di alto livello (sessioni totali, durata, volume per gruppo) consideriamo TUTTO. */
  var data=sessions.filter(function(s){return inWin(s,startMs,endMs) && s.tipo!=='cardio';});
  var allData=sessions.filter(function(s){return inWin(s,startMs,endMs);});
  var prevData=sessions.filter(function(s){return inWin(s,prevStartMs,prevEndMs) && s.tipo!=='cardio';});
  var prevAllData=sessions.filter(function(s){return inWin(s,prevStartMs,prevEndMs);});
  var pesiData=data.filter(function(s){return s.tipo!=='cal';});
  var calData=data.filter(function(s){return s.tipo==='cal';});
  var cardioData=allData.filter(function(s){return s.tipo==='cardio';});

  var byEx={};
  pesiData.forEach(function(s){expandSupersetEs(s.es).forEach(function(e){if(e.tipo==='riscaldamento')return;var t=ton([e]);if(t>0){byEx[e.nome]=(byEx[e.nome]||0)+t;}});});
  var topExs=Object.entries(byEx).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var maxT=topExs.length?topExs[0][1]:1;

  var calByEx={};
  calData.forEach(function(s){expandSupersetEs(s.es).forEach(function(e){if(e.tipo==='riscaldamento')return;var reps=(e.serie||[]).filter(function(sr){return sr.ok;}).reduce(function(a,sr){return a+sr.reps;},0);if(reps>0)calByEx[e.nome]=(calByEx[e.nome]||0)+reps;});});

  /* B2: Volume per gruppo muscolare (set completati per gruppo) */
  /* Bicipiti/Tricipiti vengono uniti sotto Braccia per il grafico MEV/MAV/MRV.
     Includiamo anche le sessioni cardio (escluse da `data` per il resto della tab) convertendo
     durata+intensità in "set equivalenti" — vedi cardioMuscleHits. Senza questo, chi fa solo
     spinning/bici si troverebbe "Gambe" a 0 anche dopo 4 ore di pedalata. */
  var volByGr={};
  var cardioVolByGr={};
  data.forEach(function(s){
    expandSupersetEs(s.es).forEach(function(e){
      if(e.tipo==='riscaldamento' || !e.gr) return;
      var sets = (e.serie||[]).filter(function(sr){return sr.ok;}).length;
      if(sets<=0) return;
      var key = (e.gr==='Bicipiti'||e.gr==='Tricipiti') ? 'Braccia' : e.gr;
      volByGr[key] = (volByGr[key]||0) + sets;
    });
  });
  /* Contributi da cardio: filtriamo dal sessions originale per stesso range, NON da `data`
     (che esclude il cardio per design negli altri grafici). */
  sessions.filter(function(s){return inWin(s,startMs,endMs) && s.tipo==='cardio';}).forEach(function(s){
    var ch = cardioMuscleHits(s);
    Object.keys(ch).forEach(function(gr){
      volByGr[gr] = (volByGr[gr]||0) + ch[gr];
      cardioVolByGr[gr] = (cardioVolByGr[gr]||0) + ch[gr];
    });
  });
  /* MEV/MAV/MRV settimanali (Schoenfeld + Israetel guidelines, semplificati) */
  var grRanges = {
    'Petto':   {mev:10, mav:18, mrv:22},
    'Schiena': {mev:10, mav:20, mrv:25},
    'Gambe':   {mev:8,  mav:18, mrv:25},
    'Spalle':  {mev:8,  mav:16, mrv:20},
    'Braccia': {mev:6,  mav:14, mrv:18},
    'Core':    {mev:0,  mav:16, mrv:25}
  };
  /* Normalizziamo i set al periodo selezionato — il range MEV/MAV/MRV è settimanale */
  var weeks = Math.max(rangeDays/7, 1);
  var weeklyVol = {};
  Object.keys(volByGr).forEach(function(gr){ weeklyVol[gr] = Math.round(volByGr[gr]/weeks); });
  var gruppiOrder = ['Petto','Schiena','Gambe','Spalle','Braccia','Core'];
  var hasVolData = Object.keys(volByGr).length > 0;

  /* Delta vs periodo precedente */
  function deltaTon(){
    var cur = pesiData.reduce(function(t,s){return t+ton(expandSupersetEs(s.es));},0);
    var prv = prevData.filter(function(s){return s.tipo!=='cal';}).reduce(function(t,s){return t+ton(expandSupersetEs(s.es));},0);
    if(prv === 0) return null;
    var pct = Math.round((cur-prv)/prv*100);
    return pct;
  }
  function deltaSessions(){
    var prv = prevAllData.length;
    if(prv === 0) return null;
    return allData.length - prv;
  }
  var dTon = deltaTon();
  var dSes = deltaSessions();

  /* Export CSV — tutti i dati del tab Allenamenti nel range selezionato */
  function exportTrainCsv(){
    var winLbl = formatCalendarLabel(rangeKey, winNow).replace(/\s+/g,'_');
    var sections = [];
    sections.push('=== PERIODO ===');
    sections.push('Range,'+csvCell(TIME_RANGES.find(function(r){return r.k===rangeKey;}).long));
    sections.push('Da,'+csvCell(winNow.start.toISOString().slice(0,10)));
    sections.push('A,'+csvCell(winNow.end.toISOString().slice(0,10)));
    sections.push('');
    sections.push('=== KPI ===');
    var kpiRows = [
      ['Sessioni totali', allData.length, dSes!=null?(dSes>=0?'+':'')+dSes+' vs prec.':''],
      ['Tonnellaggio (kg)', Math.round(pesiData.reduce(function(t,s){return t+ton(expandSupersetEs(s.es));},0)), dTon!=null?(dTon>=0?'+':'')+dTon+'%':''],
      ['Durata totale (min)', Math.round(allData.reduce(function(t,s){return t+s.dur;},0)), ''],
      ['Sessioni pesi', pesiData.length, ''],
      ['Sessioni calisthenics', calData.length, ''],
      ['Sessioni cardio', cardioData.length, '']
    ];
    sections.push(buildCsv(['KPI','Valore','Delta vs periodo precedente'], kpiRows));
    sections.push('');
    sections.push('=== SESSIONI ===');
    var sessRows = allData.slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);}).map(function(s){
      var expEs = expandSupersetEs(s.es||[]);
      var totTon = ton(expEs);
      var totReps = expEs.reduce(function(a,e){return a+(e.serie||[]).filter(function(sr){return sr.ok;}).reduce(function(x,sr){return x+(sr.reps||0);},0);},0);
      var totSets = expEs.reduce(function(a,e){return a+(e.serie||[]).filter(function(sr){return sr.ok;}).length;},0);
      return [
        new Date(s.t0).toISOString().slice(0,10),
        new Date(s.t0).toTimeString().slice(0,5),
        s.tipo||'pesi',
        s.nome||'',
        Math.round(s.dur||0),
        (s.es||[]).length,
        totSets,
        totReps,
        Math.round(totTon),
        sessionCompletionRate(s)+'%',
        (s.nota||'').replace(/\n/g,' ')
      ];
    });
    sections.push(buildCsv(['Data','Ora','Tipo','Nome','Durata (min)','Esercizi','Set completati','Reps totali','Tonnellaggio (kg)','Completamento','Nota'], sessRows));
    sections.push('');
    sections.push('=== VOLUME SETTIMANALE PER GRUPPO ===');
    var volRows = Object.keys(weeklyVol).map(function(gr){
      return [gr, weeklyVol[gr], (cardioVolByGr[gr]?Math.round(cardioVolByGr[gr]/weeks):0)];
    });
    sections.push(buildCsv(['Gruppo','Set/settimana','di cui da cardio'], volRows));
    sections.push('');
    sections.push('=== TOP ESERCIZI PESI (tonnellaggio) ===');
    var topRows = topExs.map(function(e){return [e[0], Math.round(e[1])];});
    sections.push(buildCsv(['Esercizio','Tonnellaggio (kg)'], topRows));
    sections.push('');
    sections.push('=== TOP ESERCIZI CAL (ripetizioni) ===');
    var calRows = Object.entries(calByEx).sort(function(a,b){return b[1]-a[1];}).map(function(e){return [e[0], e[1]];});
    sections.push(buildCsv(['Esercizio','Reps totali'], calRows));
    downloadFile('pumplog-allenamenti-'+winLbl+'.csv', sections.join('\n'), 'text/csv;charset=utf-8');
  }

  return h('div',{style:{padding:'24px 16px 100px'}},
    h(PageHeader,{title:'Statistiche'}),
    h(StatsTabs,{tab:tab,setTab:setTab}),
    h(TimeRangeNav,{rangeKey:rangeKey,offset:rangeOffset,setRangeKey:setRangeKey,setOffset:setRangeOffset,earliestMs:earliestMs}),
    allData.length>0 && h('div',{style:{marginBottom:14}},
      h(Btn,{sm:true,sec:true,full:true,onClick:exportTrainCsv}, '⬇  Esporta dati periodo (.csv)')
    ),
    /* C7: Empty state caldo */
    allData.length===0&&h('div',{style:{textAlign:'center',padding:'48px 24px',color:MUTED}},
      h('div',{style:{fontSize:54,marginBottom:14,opacity:0.6}},'📊'),
      h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:'0.02em',color:TEXT,marginBottom:6}},'Nessun dato ancora'),
      h('div',{style:{fontSize:13,lineHeight:1.55,marginBottom:18}},'Completa il primo allenamento e PumpLog farà il resto:',h('br'),'grafici, trend, PR — tutto calcolato per te.'),
      h('button',{onClick:function(){go('start');},style:{padding:'12px 22px',background:ACC,color:ACT,border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',letterSpacing:'0.02em'}},'Inizia a pompare →')
    ),
    allData.length>0&&h('div',null,
      /* KPI con delta — Sessioni e Durata includono anche cardio, Volume (tonnellaggio) solo pesi */
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:6}},
        [
          {n:allData.length, lbl:'Sessioni', d:dSes, tip:'Numero di allenamenti registrati nel periodo (include pesi, cal e cardio).'},
          {n:Math.round(pesiData.reduce(function(t,s){return t+ton(expandSupersetEs(s.es));},0)/100)/10+'t', lbl:'Volume', d:(dTon ? (dTon>0?'+':'')+dTon+'%' : null), tip:'Peso totale sollevato (kg × ripetizioni di tutte le serie, incluso esercizio B dei superset). 1t = 1000kg. Solo sessioni pesi — cardio e cal non hanno tonnellaggio significativo.'},
          {n:Math.round(allData.reduce(function(t,s){return t+s.dur;},0)/60)+'h', lbl:'Durata', d:null, tip:'Tempo totale passato ad allenarsi nel periodo (include pesi, cal e cardio).'}
        ].map(function(v){
          return h('div',{key:v.lbl,onClick:function(){alert(v.lbl.toUpperCase()+'\n\n'+v.tip);},style:{background:SURF2,borderRadius:12,padding:'13px 6px 11px',textAlign:'center',cursor:'pointer',border:'0.5px solid '+BORD}},
            h('div',{className:'gt-stat-num',style:{fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:'0.02em',color:ACC,lineHeight:1}},v.n),
            h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginTop:4}},v.lbl),
            v.d != null && h('div',{style:{fontSize:10,marginTop:4,color: (typeof v.d === 'number' ? v.d>=0 : String(v.d).indexOf('-')<0) ? 'var(--success)' : 'var(--danger)',fontFamily:"'Roboto Mono',monospace",fontWeight:700}},
              (typeof v.d === 'number' && v.d>0 ? '+' : '') + v.d
            )
          );
        })
      ),
      h('div',{style:{fontSize:10,color:MUTED,textAlign:'center',marginBottom:16}},'Tocca una metrica per la spiegazione'),

      /* Completion rate ring + Weekly adherence bar chart */
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}},
        /* Completion ring */
        (function(){
          var avgRate=data.length?Math.round(data.reduce(function(t,s){return t+sessionCompletionRate(s);},0)/data.length):0;
          var ci=completionLabel(avgRate);
          var circumference=2*Math.PI*36;
          var offset=circumference-(avgRate/100)*circumference;
          return h('div',{style:{background:SURF2,borderRadius:14,padding:'16px 12px',textAlign:'center',border:'0.5px solid '+BORD}},
            h('div',{style:{fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:MUTED,marginBottom:10}},'COMPLETAMENTO'),
            h('div',{style:{position:'relative',width:80,height:80,margin:'0 auto 8px'}},
              h('svg',{width:80,height:80,viewBox:'0 0 80 80'},
                h('circle',{cx:40,cy:40,r:36,fill:'none',stroke:'rgba(255,255,255,0.06)',strokeWidth:6}),
                h('circle',{cx:40,cy:40,r:36,fill:'none',stroke:ci.color,strokeWidth:6,strokeLinecap:'round',strokeDasharray:circumference,strokeDashoffset:offset,transform:'rotate(-90 40 40)',style:{transition:'stroke-dashoffset .6s ease'}})
              ),
              h('div',{style:{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontFamily:"'Bebas Neue',cursive",fontSize:22,color:ci.color}},avgRate+'%')
            ),
            h('div',{style:{fontSize:10,color:MUTED}},avgRate>=90?'Sessioni solide':'Margine di miglioramento')
          );
        })(),
        /* Adherence vs target */
        (function(){
          var target=p.profile&&p.profile.giorniTarget?p.profile.giorniTarget:3;
          var weeks=getAdherenceWeeks(sessions,Math.min(Math.ceil(rangeDays/7),8));
          var maxCount=Math.max(target,Math.max.apply(null,weeks.map(function(w){return w.count;}).concat([1])));
          return h('div',{style:{background:SURF2,borderRadius:14,padding:'16px 12px',border:'0.5px solid '+BORD}},
            h('div',{style:{fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',color:MUTED,marginBottom:10,textAlign:'center'}},'COSTANZA'),
            h('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:3,height:60,marginBottom:8}},
              weeks.map(function(w,i){
                var pct=Math.max(8,Math.round(w.count/maxCount*100));
                var hit=w.count>=target;
                return h('div',{key:i,style:{flex:1,maxWidth:16,display:'flex',flexDirection:'column',alignItems:'center',gap:2}},
                  h('div',{style:{width:'100%',height:pct*0.55+'px',minHeight:4,borderRadius:3,background:hit?'var(--success)':w.count>0?'var(--warning)':'rgba(239,68,68,0.3)',transition:'height .3s'}}),
                  h('div',{style:{fontSize:7,color:MUTED,fontFamily:"'Roboto Mono',monospace"}},w.count)
                );
              })
            ),
            h('div',{style:{height:1,background:BORD,margin:'0 0 6px',position:'relative'}},
              h('div',{style:{position:'absolute',top:-1,right:0,fontSize:8,color:MUTED,fontFamily:"'Roboto Mono',monospace"}},'target: '+target)
            ),
            h('div',{style:{fontSize:10,color:MUTED,textAlign:'center'}},
              (function(){var hitWeeks=weeks.filter(function(w){return w.count>=target;}).length;return hitWeeks+'/'+weeks.length+' settimane in target';})()
            )
          );
        })()
      ),

      /* B2: Volume settimanale per gruppo muscolare con zone MEV/MAV/MRV */
      hasVolData && h('div',{style:{marginBottom:22}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
          h(Lbl,null,'Volume per gruppo muscolare'),
          h('div',{style:{fontSize:9,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.05em'}},'serie / settimana')
        ),
        h('div',{style:{fontSize:11,color:MUTED,marginBottom:10,lineHeight:1.5}},
          'Quante serie alleni per ogni gruppo muscolare ogni settimana — pesi/cal + equivalenti cardio (spinning/bici → gambe, vogatore → schiena, ecc.) calcolati da durata × intensità. Le zone colorate ti dicono se stai facendo poco, abbastanza o troppo.'
        ),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:8,marginBottom:8,fontSize:10}},
          h('span',{style:{display:'inline-flex',alignItems:'center',gap:5}},
            h('span',{style:{width:9,height:9,background:'#94A3B8',borderRadius:2,display:'inline-block'}}),
            h('span',{style:{color:MUTED}},'Poco stimolo')
          ),
          h('span',{style:{display:'inline-flex',alignItems:'center',gap:5}},
            h('span',{style:{width:9,height:9,background:'var(--success)',borderRadius:2,display:'inline-block'}}),
            h('span',{style:{color:MUTED}},'Ottimale')
          ),
          h('span',{style:{display:'inline-flex',alignItems:'center',gap:5}},
            h('span',{style:{width:9,height:9,background:'var(--warning)',borderRadius:2,display:'inline-block'}}),
            h('span',{style:{color:MUTED}},'Al limite')
          ),
          h('span',{style:{display:'inline-flex',alignItems:'center',gap:5}},
            h('span',{style:{width:9,height:9,background:'var(--danger)',borderRadius:2,display:'inline-block'}}),
            h('span',{style:{color:MUTED}},'Troppo')
          )
        ),
        h('details',{style:{marginBottom:12,fontSize:11}},
          h('summary',{style:{cursor:'pointer',color:MUTED,padding:'4px 0',userSelect:'none'}},'Vuoi saperne di più? (MEV, MAV, MRV)'),
          h('div',{style:{padding:'10px 12px',background:SURF2,borderRadius:10,marginTop:6,lineHeight:1.55,color:TEXT}},
            h('div',{style:{marginBottom:8}},h('b',null,'MEV'),' — ',h('span',{style:{color:MUTED}},'Minimum Effective Volume. Il numero ',h('i',null,'minimo'),' di serie per vedere risultati. Sotto questa soglia stai praticamente mantenendo, non crescendo.')),
            h('div',{style:{marginBottom:8}},h('b',null,'MAV'),' — ',h('span',{style:{color:MUTED}},'Maximum Adaptive Volume. La zona ',h('i',null,'ottimale'),': qui stai dando al muscolo lo stimolo giusto per ipertrofia/forza.')),
            h('div',null,h('b',null,'MRV'),' — ',h('span',{style:{color:MUTED}},'Maximum Recoverable Volume. Il ',h('i',null,'massimo'),' che riesci a recuperare. Oltre questa soglia rischi overtraining (stanchezza cronica, infortuni, calo prestazioni).'))
          )
        ),
        gruppiOrder.filter(function(gr){return weeklyVol[gr] !== undefined;}).map(function(gr){
          var v = weeklyVol[gr];
          var cardioWeekly = cardioVolByGr[gr] ? Math.round(cardioVolByGr[gr]/weeks) : 0;
          var rg = grRanges[gr] || {mev:8, mav:18, mrv:25};
          var color, label;
          if(v < rg.mev){ color='#94A3B8'; label='poco stimolo'; }
          else if(v <= rg.mav){ color='var(--success)'; label='ottimale per crescita'; }
          else if(v <= rg.mrv){ color='var(--warning)'; label='al limite'; }
          else { color='var(--danger)'; label='troppo, rischio overtraining'; }
          /* Calcolo posizioni proporzionali sulla scala 0 → mrv*1.3 */
          var scale = rg.mrv * 1.3;
          var mevPct = (rg.mev/scale)*100;
          var mavPct = (rg.mav/scale)*100;
          var mrvPct = (rg.mrv/scale)*100;
          var valPct = Math.min(100, (v/scale)*100);
          return h('div',{key:gr,style:{marginBottom:11}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}},
              h('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
                h('span',{style:{fontSize:13,fontWeight:500}},gr),
                cardioWeekly>0 && h('span',{title:cardioWeekly+' set/sett. da cardio (stima durata × intensità)',style:{fontSize:9,color:'#00F0FF',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.04em'}}, '+'+cardioWeekly+' cardio')
              ),
              h('div',{style:{display:'flex',alignItems:'baseline',gap:6}},
                h('span',{style:{fontFamily:"'Roboto Mono',monospace",fontSize:13,fontWeight:700,color:color,fontVariantNumeric:'tabular-nums'}},v),
                h('span',{style:{fontSize:9,color:MUTED}},'·  '+label)
              )
            ),
            /* Barra con segni MEV/MAV/MRV */
            h('div',{style:{position:'relative',height:8,background:BORD,borderRadius:4,overflow:'visible'}},
              /* zona sotto MEV (grigio) */
              h('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:mevPct+'%',background:'rgba(148,163,184,0.18)'}}),
              /* zona ottimale (verde) */
              h('div',{style:{position:'absolute',left:mevPct+'%',top:0,bottom:0,width:(mavPct-mevPct)+'%',background:'rgba(34,197,94,0.18)'}}),
              /* zona warning */
              h('div',{style:{position:'absolute',left:mavPct+'%',top:0,bottom:0,width:(mrvPct-mavPct)+'%',background:'rgba(245,158,11,0.18)'}}),
              /* zona oltre MRV */
              h('div',{style:{position:'absolute',left:mrvPct+'%',top:0,bottom:0,right:0,background:'rgba(239,68,68,0.18)'}}),
              /* indicatore valore */
              h('div',{style:{position:'absolute',left:0,top:0,bottom:0,width:valPct+'%',background:color,borderRadius:'4px 0 0 4px'}}),
              /* segno MEV */
              h('div',{style:{position:'absolute',left:mevPct+'%',top:-2,bottom:-2,width:1,background:'rgba(255,255,255,0.25)'}}),
              h('div',{style:{position:'absolute',left:mavPct+'%',top:-2,bottom:-2,width:1,background:'rgba(255,255,255,0.25)'}}),
              h('div',{style:{position:'absolute',left:mrvPct+'%',top:-2,bottom:-2,width:1,background:'rgba(255,255,255,0.25)'}})
            ),
            h('div',{style:{position:'relative',height:12,marginTop:2,fontSize:8,color:'var(--muted-2)',fontFamily:"'Roboto Mono',monospace"}},
              h('span',{style:{position:'absolute',left:(mevPct)+'%',transform:'translateX(-50%)'}},rg.mev),
              h('span',{style:{position:'absolute',left:(mavPct)+'%',transform:'translateX(-50%)'}},rg.mav),
              h('span',{style:{position:'absolute',left:(mrvPct)+'%',transform:'translateX(-50%)'}},rg.mrv)
            )
          );
        })
      ),

      topExs.length>0&&h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}},
          h(Lbl,null,'Top esercizi · tonnellaggio + andamento'),
          h('div',{style:{fontSize:9,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.05em'}},'tocca per dettaglio')
        ),
        topExs.map(function(e){
          /* Trend per esercizio: confronta tonnellaggio medio per sessione tra prima metà e seconda metà del range */
          var ptsForEx = [];
          sessions.slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);}).forEach(function(s){
            (s.es||[]).forEach(function(ex){
              if(ex.nome !== e[0]) return;
              var t = ton([ex]);
              if(t>0) ptsForEx.push({t0:s.t0, v:t});
            });
          });
          var trend = computeTrend(ptsForEx);
          var volPerSess = ptsForEx.length ? Math.round(ptsForEx.reduce(function(a,p){return a+p.v;},0) / ptsForEx.length) : 0;
          return h('div',{key:e[0],onClick:function(){hap(8);setSel({nome:e[0],sessions:sessions});},style:{background:SURF,border:'0.5px solid '+BORD,borderRadius:10,padding:'12px 14px',marginBottom:8,cursor:'pointer'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6,gap:8}},
              h('div',{style:{fontSize:13,fontWeight:500,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},e[0]),
              h('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},

              )

            h('div',{style:{height:6,background:BORD,borderRadius:3,marginBottom:5}},h('div',{style:{height:'100%',background:ACC,borderRadius:3,width:(e[1]/maxT*100)+'%'}})),
            h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Roboto Mono',monospace"}},ptsForEx.length+' sessioni · media '+volPerSess+'kg/sessione')
          );
        })
      ),
      Object.keys(calByEx).length>0&&h('div',{style:{marginTop:18}},
        h(Lbl,null,'Calisthenics · ripetizioni totali + andamento'),
        Object.entries(calByEx).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){
          /* Per la cal, trend è sulle reps totali per sessione */
          var ptsForEx = [];
          sessions.slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);}).forEach(function(s){
            (s.es||[]).forEach(function(ex){
              if(ex.nome !== e[0]) return;
              var reps = (ex.serie||[]).filter(function(sr){return sr.ok;}).reduce(function(a,sr){return a+(sr.reps||0)+ (sr.durata||0);},0);
              if(reps>0) ptsForEx.push({t0:s.t0, v:reps});
            });

            h('div',{style:{fontSize:13,flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},e[0]),
            h('div',{style:{display:'flex',alignItems:'center',gap:6,flexShrink:0}},
              ptsForEx.length>=2 && h(TrendBadge,{trend:trend}),
              h('div',{style:{fontFamily:"'Roboto Mono',monospace",color:ACC,fontSize:13,fontWeight:700,fontVariantNumeric:'tabular-nums'}},e[1]+' reps')
            )
          );
        })
      )
    ),
    sel&&h(EsDetail,{nome:sel.nome,sessions:sel.sessions,onClose:function(){setSel(null);}})
  );
}

/* ── grafico SVG semplice ── */
function Chart(p){
  var data=p.data;
  if(!data||data.length<2)return h('div',{style:{textAlign:'center',padding:30,color:MUTED,fontSize:12}},'Servono almeno 2 sessioni per il grafico');
  var w=320,hg=120,pad=14;
  var max=Math.max.apply(null,data.map(function(d){return d.v;}))*1.05;
  var min=Math.min.apply(null,data.map(function(d){return d.v;}))*0.95;
  var rg=max-min||1;
  var pts=data.map(function(d,i){return {x:pad+(i/(data.length-1))*(w-pad*2),y:hg-pad-((d.v-min)/rg)*(hg-pad*2),v:d.v};});
  var pathD=pts.map(function(p,i){return (i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
  return h('svg',{width:'100%',height:hg,viewBox:'0 0 '+w+' '+hg,style:{display:'block'}},
    h('path',{d:pathD+' L '+pts[pts.length-1].x.toFixed(1)+','+(hg-pad)+' L '+pts[0].x.toFixed(1)+','+(hg-pad)+' Z',fill:ACC5}),
    h('path',{d:pathD,stroke:ACC,strokeWidth:2,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}),
    pts.map(function(p,i){return h('circle',{key:i,cx:p.x,cy:p.y,r:3,fill:ACC,stroke:BG,strokeWidth:1});})
  );
}

/* ── dettaglio esercizio progressione ── */
function EsDetail(p){
  var nome=p.nome,sessions=p.sessions,onClose=p.onClose;
  var hist=[];
  var isCalEx = false;
  sessions.slice().sort(function(a,b){return new Date(a.t0)-new Date(b.t0);}).forEach(function(s){
    expandSupersetEs(s.es).forEach(function(e){
      if(e.nome!==nome) return;
      if(s.tipo==='cal' || e.modalita==='hold') isCalEx = true;
      var f=e.serie.filter(function(sr){return sr.ok;});
      if(!f.length) return;
      var t = f.reduce(function(a,sr){return a+(sr.peso||0)*(sr.reps||0);},0);
      var mx = f.length ? Math.max.apply(null,f.map(function(sr){return rm1(sr.peso||0,sr.reps||0);})) : 0;
      var reps = f.reduce(function(a,sr){return a+(sr.reps||0);},0);
      var dur = f.reduce(function(a,sr){return a+(sr.durata||0);},0);
      hist.push({t0:s.t0, v:t, mx:mx, sets:f.length, reps:reps, dur:dur, note:s.nota||''});
    });
  });
  var rev=hist.slice().reverse();
  /* Metrica principale: tonnellaggio per pesi, reps totali per cal, secondi per hold */
  var primary = hist.map(function(x){
    if(x.dur > 0) return {v: x.dur};
    if(x.v > 0) return {v: x.v};
    return {v: x.reps};
  });
  var trend = computeTrend(primary);
  var primaryLabel = isCalEx ? (hist.some(function(x){return x.dur>0;}) ? 'Secondi totali (hold)' : 'Ripetizioni totali') : 'Tonnellaggio (kg)';
  var first = primary.length ? primary[0].v : 0;
  var last = primary.length ? primary[primary.length-1].v : 0;
  return h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.92)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'},onClick:function(e){if(e.target===e.currentTarget)onClose();}},
    h('div',{className:'su',style:{width:'100%',maxWidth:440,background:SURF,borderRadius:'20px 20px 0 0',padding:'18px 16px 36px',maxHeight:'90vh',overflowY:'auto'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,gap:8}},
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:26,letterSpacing:'0.02em',lineHeight:1.1,marginBottom:hist.length>=2?4:0}},nome),
          hist.length>=2 && h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}},
            h(TrendBadge,{trend:trend,showLabel:true}),
            h('span',{style:{fontSize:11,color:MUTED}}, 'da ' + Math.round(first) + ' a ' + Math.round(last))
          )
        ),
        h('button',{onClick:onClose,style:{background:'none',border:'none',color:MUTED,cursor:'pointer'}},h(Icon,{n:'close',sz:20,c:MUTED}))
      ),
      hist.length>=2?h('div',null,
        h(Lbl,null,primaryLabel+' nel tempo'),
        h(Chart,{data:primary}),
        h('div',{style:{fontSize:11,color:MUTED,marginTop:4,marginBottom:14,textAlign:'center'}},
          trend.dir==='up'?'📈 Stai migliorando — continua così.':
          trend.dir==='down'?'📉 Calo: rivedi recupero, sonno o riduci volume per 1 settimana.':
          '➡️ Stallo: cambia stimolo (più volume, RPE, tecnica, oppure deload).'
        ),
        !isCalEx && h(Lbl,null,'1RM stimato (top)'),
        !isCalEx && h(Chart,{data:hist.map(function(x){return {v:x.mx};})})
      ):h('div',{style:{textAlign:'center',padding:20,color:MUTED,fontSize:13}},'Servono almeno 2 sessioni per vedere il trend.'),
      h('div',{style:{height:14}}),
      h(Lbl,null,'Cronologia ('+rev.length+')'),
      rev.map(function(x,i){
        var dispVol = x.dur>0 ? (x.dur+'s · hold') : (x.v>0 ? Math.round(x.v)+'kg · 1RM ~'+x.mx+'kg' : x.reps+' reps');
        return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'0.5px solid '+BORD,gap:8}},
          h('div',{style:{fontSize:13,flexShrink:0}},fmtD(x.t0)),
          h('div',{style:{fontSize:12,color:MUTED,textAlign:'right'}},dispVol+' · '+x.sets+' set')
        );
      })
    )
  );
}

/* Chart settimanale scorribile orizzontalmente. Barra a larghezza fissa così
   "5-11 mag" è sempre leggibile sotto ogni colonna. Su mount/cambio range
   scrolla a destra per mostrare subito "Ora". Gradiente fade a sinistra per
   suggerire che c'è altro da scoprire scrollando. */
function AdherenceChartScrollable(p){
  var weeks = p.weeks;
  var target = p.target;
  var maxBarCount = p.maxBarCount;
  var numWeeks = p.numWeeks;
  var weekRangeLabel = p.weekRangeLabel;
  var scrollRef = useRef(null);
  /* Scroll alla fine (destra) ad ogni cambio range, così "Ora" è visibile */
  useEffect(function(){
    var el = scrollRef.current;
    if(el){
      /* doppio rAF per garantire layout completato prima di scrollare */
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          if(scrollRef.current) scrollRef.current.scrollLeft = scrollRef.current.scrollWidth;
        });
      });
    }
  }, [numWeeks]);
  var headerTitle = p.title || (numWeeks === 1 ? '1 settimana' : numWeeks+' settimane');
  /* Barra: ~40px abbondante per label "5-11 mag" + gap 5px */
  var BAR_W = 40;
  var BAR_GAP = 5;
  return h('div',{style:{background:SURF2,borderRadius:14,padding:'16px',marginBottom:16,border:'0.5px solid '+BORD}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
      h('div',{style:{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',color:TEXT}}, headerTitle),
      h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Roboto Mono',monospace"}},'target: '+target+'/sett')
    ),
    h('div',{style:{fontSize:10,color:MUTED,marginBottom:8,lineHeight:1.4}},'Ogni barra = una settimana (lun-dom). ' + (numWeeks>8?'← Scorri per vedere lo storico.':'Verde = target, giallo = parziale, rosso = vuota.')),
    /* Wrapper relative per il gradient fade sui bordi */
    h('div',{style:{position:'relative'}},
      /* Scroller orizzontale */
      h('div',{
        ref: scrollRef,
        style:{
          overflowX:'auto',
          overflowY:'hidden',
          WebkitOverflowScrolling:'touch',
          paddingBottom:4,
          /* nascondi scrollbar visiva (Webkit) — gestita via CSS globale se vuoi */
          scrollbarWidth:'thin',
          scrollbarColor: BORD+' transparent'
        }
      },
        h('div',{style:{display:'inline-flex',alignItems:'flex-end',gap:BAR_GAP,height:90,paddingLeft:2,paddingRight:2}},
          weeks.map(function(w,i){
            var barH=Math.max(6,Math.round(w.count/maxBarCount*80));
            var hit=w.count>=target;
            var weekLbl = weekRangeLabel(w.start);
            var isCurrent = weekLbl === 'Questa' || weekLbl === 'Ora';
            return h('div',{key:i,style:{flexShrink:0,width:BAR_W,display:'flex',flexDirection:'column',alignItems:'center',gap:4}},
              h('div',{style:{fontSize:10,fontFamily:"'Roboto Mono',monospace",color:hit?'var(--success)':w.count>0?TEXT:MUTED,fontWeight:700,minHeight:12}},w.count),
              h('div',{style:{width:'100%',height:barH,borderRadius:3,background:hit?'var(--success)':w.count>0?'var(--warning)':'rgba(239,68,68,0.25)',transition:'height .3s',outline: isCurrent ? '1.5px solid '+ACC : 'none', outlineOffset: isCurrent?2:0}}),
              h('div',{style:{fontSize:9,color:isCurrent?ACC:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:isCurrent?700:500,letterSpacing:'0.02em',whiteSpace:'nowrap',minHeight:12}},weekLbl)
            );
          })
        )
      ),
      /* Gradient fade a sinistra: indica visivamente che c'è contenuto fuori vista */
      numWeeks > 8 && h('div',{
        'aria-hidden':true,
        style:{
          position:'absolute',top:0,left:0,bottom:0,width:24,
          background:'linear-gradient(to right, '+SURF2+', transparent)',
          pointerEvents:'none'
        }
      })
    )
  );
}

/* ── Adherence stats tab: costanza, streak, muscle heatmap ── */
function AdherenceView(p){
  var sessions=p.sessions,profile=p.profile;
  /* Periodo deciso dal TimeRangeNav esterno (rangeKey + rangeOffset) */
  var rangeKey = p.rangeKey || '1m';
  var rangeOffset = p.rangeOffset || 0;
  var win = getCalendarWindow(rangeKey, rangeOffset);
  var startMs = win.start.getTime(), endMs = win.end.getTime();
  /* Target: se l'utente ha impostato breakdown per disciplina (pesi/cal/cardio), uso la somma.
     Altrimenti uso il totale profile.giorniTarget. */
  var bd = loadTargetBreakdown();
  var target = (bd && (bd.pesi||0)+(bd.cal||0)+(bd.cardio||0) > 0)
    ? (bd.pesi||0)+(bd.cal||0)+(bd.cardio||0)
    : (profile&&profile.giorniTarget?profile.giorniTarget:3);
  /* Costruisco la lista delle settimane (lun-dom) che cadono dentro la finestra selezionata */
  function buildWeeksInWindow(){
    var arr = [];
    var ws = getWeekStart(new Date(startMs));
    while(ws.getTime() <= endMs){
      var we = new Date(ws); we.setDate(we.getDate()+6); we.setHours(23,59,59,999);
      if(we.getTime() >= startMs){
        var weekSess = sessions.filter(function(s){
          var t = new Date(s.t0).getTime();
          return t >= ws.getTime() && t <= we.getTime();
        });
        arr.push({start: new Date(ws), sessions: weekSess, count: weekSess.length});
      }
      ws = new Date(ws.getTime() + 7*86400000);
    }
    return arr;
  }
  var weeks = buildWeeksInWindow();
  var numWeeks = weeks.length;
  var maxBarCount=Math.max(target,Math.max.apply(null,weeks.map(function(w){return w.count;}).concat([1])));

  /* Streak: settimane consecutive in cui si è raggiunto il target, calcolato sulla finestra
     selezionata. La settimana corrente conta come "bonus" se è già a target. */
  var weekStreak=0;
  for(var wi=weeks.length-2;wi>=0;wi--){
    if(weeks[wi].count>=target) weekStreak++;
    else break;
  }
  if(weeks.length && weeks[weeks.length-1].count>=target) weekStreak++;

  /* Muscle coverage: SEMPRE ultimi 7 giorni — è uno snapshot dello stato attuale,
     non un'analisi storica. Indipendente dal selettore periodo.
     Include set equivalenti da cardio (vedi cardioMuscleHits) così spinning/bici contribuiscono
     a "Gambe" invece di lasciarlo a 0 quando l'utente fa cardio + qualche allenamento pesi. */
  var now=Date.now();
  var recentSessions=sessions.filter(function(s){return new Date(s.t0).getTime()>=now-7*86400000;});
  var muscleHits={};
  var muscleCardioHits={};
  recentSessions.forEach(function(s){
    if(s.tipo==='cardio'){
      var ch=cardioMuscleHits(s);
      Object.keys(ch).forEach(function(gr){
        muscleHits[gr]=(muscleHits[gr]||0)+ch[gr];
        muscleCardioHits[gr]=(muscleCardioHits[gr]||0)+ch[gr];
      });
      return;
    }
    (s.es||[]).forEach(function(e){
      if(e.tipo==='riscaldamento'||!e.gr) return;
      var sets=(e.serie||[]).filter(function(sr){return sr.ok;}).length;
      if(sets>0){
        var key=(e.gr==='Bicipiti'||e.gr==='Tricipiti')?'Braccia':e.gr;
        muscleHits[key]=(muscleHits[key]||0)+sets;
      }
    });
  });
  var allMuscles=['Petto','Schiena','Spalle','Braccia','Gambe','Core'];
  var maxMuscle=Math.max.apply(null,allMuscles.map(function(m){return muscleHits[m]||0;}).concat([1]));

  /* Completamento: media % serie spuntate per sessione nel range selezionato. */
  var sessionsInRange = sessions.filter(function(s){var t=new Date(s.t0).getTime();return t>=startMs && t<=endMs;});
  var avgCompletion = sessionsInRange.length
    ? Math.round(sessionsInRange.reduce(function(t,s){return t+sessionCompletionRate(s);},0)/sessionsInRange.length)
    : 0;

  /* Skipped weeks (0 sessions) nel range. Escludiamo settimane prima della prima sessione. */
  var firstSessionTime = sessions.length ? Math.min.apply(null, sessions.map(function(s){return new Date(s.t0).getTime();})) : Date.now();
  var skippedWeeks = weeks.filter(function(w){
    return w.count===0 && w.start.getTime() + 7*86400000 > firstSessionTime;
  }).length;
  var validWeeksCount = weeks.filter(function(w){
    return w.start.getTime() + 7*86400000 > firstSessionTime;
  }).length;

  /* Helper per le label settimane: range "5-11 mag", oppure "Questa", "Scorsa" */
  var currentMonday = getWeekStart(new Date()).getTime();
  function weekRangeLabel(weekStart, idx, total){
    var ws = new Date(weekStart);
    var we = new Date(weekStart); we.setDate(we.getDate()+6);
    if(ws.getTime() === currentMonday) return 'Questa';
    if(ws.getTime() === currentMonday - 7*86400000) return 'Scorsa';
    /* Range compatto: se stesso mese "5-11 mag", se cross-mese "29 apr - 5 mag" */
    var sameMonth = ws.getMonth() === we.getMonth();
    var monShort = function(d){return d.toLocaleDateString('it-IT',{month:'short'}).replace('.','');};
    if(sameMonth) return ws.getDate()+'-'+we.getDate()+' '+monShort(we);
    return ws.getDate()+monShort(ws)+'-'+we.getDate()+monShort(we);
  }

  /* Tile KPI cliccabile con spiegazione plain-language */
  function kpiTile(val, label, color, helpText, subLabel){
    return h('div',{
      onClick: function(){ alert(label+'\n\n'+helpText); },
      style:{background:SURF2,borderRadius:12,padding:'14px 6px 11px',textAlign:'center',border:'0.5px solid '+BORD,cursor:'pointer',position:'relative'}
    },
      h('div',{className:'gt-stat-num',style:{fontFamily:"'Bebas Neue',cursive",fontSize:28,color:color,lineHeight:1}},val),
      h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',marginTop:4,display:'flex',alignItems:'center',justifyContent:'center',gap:4}},
        label,
        h('span',{style:{fontSize:9,opacity:0.55}},'ⓘ')
      ),
      subLabel && h('div',{style:{fontSize:9,color:MUTED,marginTop:2,opacity:0.7,fontFamily:"'Roboto Mono',monospace"}}, subLabel)
    );
  }

  /* Breakdown disciplina della settimana corrente, se l'utente ha impostato target per tipo */
  var currentWeekStart = getWeekStart(new Date());
  var thisWeekSess = sessions.filter(function(s){
    var ws = getWeekStart(new Date(s.t0));
    return ws.getTime() === currentWeekStart.getTime();
  });
  var byDisc = {pesi:0, cal:0, cardio:0};
  thisWeekSess.forEach(function(s){ byDisc[sessionDiscipline(s)]++; });
  var hasBreakdown = !!(bd && ((bd.pesi||0)+(bd.cal||0)+(bd.cardio||0) > 0));

  /* Export CSV — dati Costanza nel periodo selezionato */
  function exportAdherenceCsv(){
    var winLbl = formatCalendarLabel(rangeKey, win).replace(/\s+/g,'_');
    var sections = [];
    sections.push('=== PERIODO ===');
    sections.push('Range,'+csvCell(TIME_RANGES.find(function(r){return r.k===rangeKey;}).long));
    sections.push('Da,'+csvCell(win.start.toISOString().slice(0,10)));
    sections.push('A,'+csvCell(win.end.toISOString().slice(0,10)));
    sections.push('Target settimanale,'+target);
    sections.push('');
    sections.push('=== KPI COSTANZA ===');
    sections.push(buildCsv(['Metrica','Valore'],[
      ['Streak settimane',weekStreak],
      ['Completamento medio',avgCompletion+'%'],
      ['Settimane saltate',validWeeksCount===0?'—':skippedWeeks],
      ['Settimane valide',validWeeksCount],
      ['Sessioni nel periodo',sessionsInRange.length]
    ]));
    sections.push('');
    sections.push('=== SETTIMANE ===');
    var weekRows = weeks.map(function(w){
      var we = new Date(w.start); we.setDate(we.getDate()+6);
      var avg = w.sessions.length ? Math.round(w.sessions.reduce(function(t,s){return t+sessionCompletionRate(s);},0)/w.sessions.length) : 0;
      return [
        w.start.toISOString().slice(0,10),
        we.toISOString().slice(0,10),
        w.count,
        w.count>=target?'sì':'no',
        avg+'%'
      ];
    });
    sections.push(buildCsv(['Inizio (lun)','Fine (dom)','Sessioni','Target raggiunto','Completamento medio'], weekRows));
    sections.push('');
    sections.push('=== COPERTURA MUSCOLARE (ultimi 7 giorni) ===');
    var mRows = allMuscles.map(function(m){return [m, muscleHits[m]||0, muscleCardioHits[m]||0];});
    sections.push(buildCsv(['Gruppo','Set totali','di cui da cardio'], mRows));
    downloadFile('pumplog-costanza-'+winLbl+'.csv', sections.join('\n'), 'text/csv;charset=utf-8');
  }

  return h('div',null,
    /* Export del periodo corrente */
    sessions.length > 0 && h('div',{style:{marginBottom:12}},
      h(Btn,{sm:true,sec:true,full:true,onClick:exportAdherenceCsv}, '⬇  Esporta dati periodo (.csv)')
    ),
    /* Top KPI row */
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:hasBreakdown?12:16}},
      kpiTile(
        weekStreak,
        'SETT. STREAK',
        weekStreak>0?'var(--success)':MUTED,
        'Settimane consecutive in cui hai raggiunto il target ('+target+'/sett). Se questa settimana sei già a target, conta. Saltare una settimana azzera il contatore.\n\nLa streak guarda solo dentro il periodo selezionato — se vuoi vedere streak storiche più lunghe, allarga il range.'
      ),
      kpiTile(
        avgCompletion+'%',
        'COMPLETAMENTO',
        avgCompletion>=80?'var(--success)':avgCompletion>=50?'var(--warning)':'var(--danger)',
        'Media di serie spuntate ✓ per sessione nel periodo selezionato ('+sessionsInRange.length+' sessioni).\n\nLe sessioni cardio contano 100% per definizione (non hanno serie da spuntare). Se questa media è bassa significa che inizi le sessioni ma le abbandoni a metà.'
      ),
      kpiTile(
        validWeeksCount===0 ? '—' : String(skippedWeeks),
        'SETT. SALTATE',
        validWeeksCount===0 ? MUTED : (skippedWeeks===0?'var(--success)':skippedWeeks<=2?'var(--warning)':'var(--danger)'),
        'Numero di settimane in cui non ti sei allenato nessun giorno, nel periodo selezionato ('+numWeeks+' settiman'+(numWeeks===1?'a':'e')+').\n\nVengono conteggiate solo le settimane dopo la tua prima sessione (altrimenti per chi inizia oggi apparirebbero settimane saltate, cosa che non vuol dire nulla).',
        validWeeksCount===0 ? null : ('su '+validWeeksCount+' sett.')
      )
    ),

    /* Breakdown per disciplina della settimana corrente, se ha target per tipo */
    hasBreakdown && h('div',{style:{background:SURF2,borderRadius:12,padding:'12px 14px',marginBottom:16,border:'0.5px solid '+BORD}},
      h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:8}},'Questa settimana per tipologia'),
      ['pesi','cal','cardio'].map(function(d){
        var tt = (bd && bd[d]) || 0;
        if(tt === 0) return null;
        var done = byDisc[d];
        var pct = Math.min(100, Math.round(done/tt*100));
        var m = DISCIPLINE_META[d];
        var hit = done >= tt;
        return h('div',{key:d,style:{marginBottom:7}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3,fontSize:12}},
            h('div',{style:{display:'flex',alignItems:'center',gap:6}},
              h('span',{style:{fontSize:14}},m.emoji),
              h('span',{style:{color:TEXT}},m.label)
            ),
            h('span',{style:{fontFamily:"'Roboto Mono',monospace",fontWeight:700,color:hit?'var(--success)':TEXT}}, done+'/'+tt)
          ),
          h('div',{style:{width:'100%',height:6,borderRadius:3,background:'rgba(255,255,255,0.08)',overflow:'hidden'}},
            h('div',{style:{width:pct+'%',height:'100%',borderRadius:3,background:hit?'var(--success)':m.color,transition:'width .4s'}})
          )
        );
      })
    ),

    /* Weekly adherence chart — scorribile orizzontalmente.
       Ogni barra ha larghezza fissa abbastanza per ospitare "5-11 mag" leggibile.
       Al cambio range, scrolliamo automaticamente a destra così "Ora" è subito visibile. */
    h(AdherenceChartScrollable, {
      weeks: weeks,
      target: target,
      maxBarCount: maxBarCount,
      numWeeks: numWeeks,
      weekRangeLabel: weekRangeLabel,
      title: formatCalendarLabel(rangeKey, win)
    }),

    /* Muscle coverage heatmap */
    h('div',{style:{background:SURF2,borderRadius:14,padding:'16px',marginBottom:16,border:'0.5px solid '+BORD}},
      h('div',{style:{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.04em',textTransform:'uppercase',color:TEXT,marginBottom:4}},'Copertura muscolare'),
      h('div',{style:{fontSize:10,color:MUTED,marginBottom:12}},'Gruppi allenati ultimi 7 giorni · pesi/cal + equivalenti cardio (spinning/bici → gambe)'),

/* ── BodyView: misure corporee + grafici trend + export ──
   Gestisce: registrazione entry (peso, %BF, %LBM, circonferenze), storico,
   grafici trend per ogni metrica, export CSV per nutrizionista. */
var BODY_FIELDS = [
  /* Composizione — peso si pre-popola dal profilo, BMI è auto-calcolato (non field) */

];
/* Colori distintivi per il grafico multi-metrica. Stabili tra sessioni così l'occhio impara. */
var BODY_COLORS = {
  peso:           '#C8FF00',
  bmi:            '#94A3B8',
  massaGrassaKg:  '#EF4444',
  massaMagraKg:   '#22C55E',
  acquaTotale:    '#00F0FF',
  acquaExtra:     '#3B82F6',
  acquaIntra:     '#A855F7',
  vita:           '#F59E0B',
  fianchi:        '#EC4899',
  addome:         '#F97316',
  coscia:         '#14B8A6'
};
/* "Buono se sale" vs "buono se scende" — usato per colorare le frecce del riepilogo. */
function metricDirHint(key, obiettivo){
  if(key==='massaMagraKg' || key==='acquaTotale' || key==='acquaIntra') return 'up';
  if(key==='massaGrassaKg' || key==='vita' || key==='addome' || key==='fianchi') return 'down';
  if(key==='peso'){
    if(obiettivo==='Definizione') return 'down';
    if(obiettivo==='Forza' || obiettivo==='Ipertrofia') return 'up';
  }
  return null;
}
function humanSpan(days){
  if(days < 14) return days + ' giorni';
  if(days < 60) return Math.round(days/7) + ' settimane';
  if(days < 365) return Math.max(1,Math.round(days/30)) + ' mesi';
  return Math.round(days/365*10)/10 + ' anni';
}

/* Grafico multi-metrica: ogni metrica diventa una linea normalizzata come variazione %
   rispetto al primo valore. Così metriche con unità diverse (kg / cm / L) sono confrontabili
   sullo stesso asse Y. La linea tratteggiata a 0% è la baseline. */
function MultiMetricChart(p){
  var series = (p.series||[]).filter(function(s){ return s.points && s.points.length >= 2; });
  var w=320, hg=170, padX=14, padY=20;
  if(series.length === 0){
    return h('div',{style:{height:hg,display:'flex',alignItems:'center',justifyContent:'center',color:MUTED,fontSize:12,textAlign:'center',padding:'0 20px'}},'Servono almeno 2 misurazioni per la panoramica');
  }
  var visible = series.filter(function(s){ return (p.hidden||[]).indexOf(s.key) < 0; });
  if(visible.length === 0){
    return h('div',{style:{height:hg,display:'flex',alignItems:'center',justifyContent:'center',color:MUTED,fontSize:12,textAlign:'center',padding:'0 20px'}},'Nessuna metrica attiva — tocca una etichetta sotto per accenderla');
  }
  var allTs=[], allD=[];
  visible.forEach(function(s){
    var base = s.points[0].v;
    var denom = Math.abs(base) || 1;
    s.points.forEach(function(pt){
      allTs.push(new Date(pt.t0).getTime());
      allD.push((pt.v - base)/denom * 100);
    });
  });
  var tMin=Math.min.apply(null,allTs), tMax=Math.max.apply(null,allTs);
  var tRng=tMax-tMin || 86400000;
  var yMin=Math.min.apply(null,allD), yMax=Math.max.apply(null,allD);
  if(yMin===yMax){ yMin-=1; yMax+=1; }
  var yPad=Math.max(0.5,(yMax-yMin)*0.15);
  yMin-=yPad; yMax+=yPad;
  function xFor(t){ return padX + ((t-tMin)/tRng) * (w-padX*2); }
  function yFor(d){ return hg-padY - ((d-yMin)/(yMax-yMin)) * (hg-padY*2); }
  var yZero=yFor(0);
  return h('svg',{width:'100%',height:hg,viewBox:'0 0 '+w+' '+hg,style:{display:'block'},role:'img','aria-label':'Grafico variazione percentuale di '+visible.length+' metriche'},
    h('line',{x1:padX,x2:w-padX,y1:yZero,y2:yZero,stroke:'rgba(255,255,255,0.18)',strokeDasharray:'3,4',strokeWidth:1}),
    h('text',{x:w-padX-2,y:yZero-3,fontSize:8,fill:'rgba(255,255,255,0.4)',textAnchor:'end',fontFamily:"'Roboto Mono',monospace"},'baseline 0%'),
    h('text',{x:padX,y:padY-6,fontSize:8,fill:'rgba(255,255,255,0.4)',fontFamily:"'Roboto Mono',monospace"},'+'+Math.round(yMax)+'%'),
    h('text',{x:padX,y:hg-4,fontSize:8,fill:'rgba(255,255,255,0.4)',fontFamily:"'Roboto Mono',monospace"},Math.round(yMin)+'%'),
    visible.map(function(s){
      var base = s.points[0].v;
      var denom = Math.abs(base) || 1;
      var pts = s.points.map(function(pt){
        return {x:xFor(new Date(pt.t0).getTime()), y:yFor((pt.v-base)/denom*100)};
      });
      var path = pts.map(function(pt,i){ return (i===0?'M':'L') + pt.x.toFixed(1)+','+pt.y.toFixed(1); }).join(' ');
      return h('g',{key:s.key},
        h('path',{d:path,stroke:s.color,strokeWidth:1.8,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}),
        pts.map(function(pt,i){
          return h('circle',{key:i,cx:pt.x,cy:pt.y,r:2.4,fill:s.color,stroke:BG,strokeWidth:0.5});
        })
      );
    })
  );
}

/* Riepilogo "in chiaro": frase con frecce colorate per ogni metrica con variazione ≥ 0.1.
   La direzione "buono/cattivo" dipende dall'obiettivo (es. peso ↑ è buono per Ipertrofia, ↓ per Definizione). */
function PlainBodySummary(p){
  var series = (p.series||[]).filter(function(s){ return s.points && s.points.length >= 2; });
  if(series.length === 0) return null;
  var allTs=[];
  series.forEach(function(s){ s.points.forEach(function(pt){ allTs.push(new Date(pt.t0).getTime()); }); });
  var days = Math.round((Math.max.apply(null,allTs)-Math.min.apply(null,allTs))/86400000) || 1;
  var span = humanSpan(days);
  var changes = series.map(function(s){
    var first=s.points[0].v, last=s.points[s.points.length-1].v;
    var d = last-first;
    if(Math.abs(d) < 0.1) return null;
    var dr = Math.round(d*10)/10;
    var dStr = (dr>0?'+':'') + String(dr).replace('.',',') + s.unit;
    var dir = metricDirHint(s.key, p.obiettivo);
    var good = dir ? ((dir==='up') === (d>0)) : null;
    return {key:s.key, label:s.label, dStr:dStr, dPos:d>0, good:good, color:s.color};
  }).filter(Boolean);
  if(changes.length === 0){
    return h('div',{style:{padding:'10px 12px',background:SURF2,borderRadius:10,marginBottom:10,fontSize:12,color:MUTED,lineHeight:1.5}},
      'In ' + span + ' nessuna variazione significativa nelle metriche tracciate.'
    );
  }
  return h('div',{style:{padding:'10px 12px',background:SURF2,borderRadius:10,marginBottom:10}},
    h('div',{style:{fontSize:9,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:6}}, 'In ' + span),
    h('div',{style:{display:'flex',flexDirection:'column',gap:3}},
      changes.map(function(c){
        var col = c.good===true ? 'var(--success)' : (c.good===false ? 'var(--danger)' : TEXT);
        return h('div',{key:c.key,style:{display:'flex',alignItems:'center',gap:8,fontSize:12,lineHeight:1.4}},
          h('span',{style:{width:6,height:6,borderRadius:3,background:c.color,flexShrink:0}}),
          h('span',{style:{color:TEXT,flex:1}}, c.label),
          h('span',{style:{color:col,fontFamily:"'Roboto Mono',monospace",fontWeight:700,fontSize:12}}, (c.dPos?'▲ ':'▼ ') + c.dStr)
        );
      })
    )
  );
}

/* Field "virtuale" calcolato: BMI = peso / (altezza_m)^2.
   Non si inserisce manualmente, ma viene incluso nei grafici trend e nelle KPI.
   Categoria OMS: <18.5 sottopeso · 18.5-24.9 normo · 25-29.9 sovrappeso · ≥30 obeso. */
function calcBmi(peso, altezzaCm){
  var p = parseFloat(String(peso).replace(',','.'));
  var a = parseFloat(String(altezzaCm).replace(',','.'));
  if(!p || !a || a <= 0) return null;
  var m = a / 100;
  return Math.round((p / (m*m)) * 10) / 10;
}
function bmiCategory(bmi){
  if(bmi == null) return null;
  if(bmi < 18.5) return {label:'sottopeso', color:'#3B82F6'};
  if(bmi < 25)   return {label:'normopeso', color:'var(--success)'};
  if(bmi < 30)   return {label:'sovrappeso', color:'var(--warning)'};
  return {label:'obesità', color:'var(--danger)'};
}
function BodyView(p){
  var log = p.log || [];

  var profile = p.profile;
  var setProfile = p.setProfile;
  var altezzaCm = profile && profile.altezza ? parseFloat(String(profile.altezza).replace(',','.')) : null;
  var obiettivo = profile && profile.obiettivo || '';
  var _f = useState(false); var formOpen = _f[0]; var setFormOpen = _f[1];
  var _ed = useState(null); var editing = _ed[0]; var setEditing = _ed[1];
  var _sel = useState('peso'); var selMetric = _sel[0]; var setSelMetric = _sel[1];
  var _vw = useState('overview'); var chartView = _vw[0]; var setChartView = _vw[1];

     SortedInRange: solo quelle dentro la finestra calendar-anchored corrente — usato per

  var sorted = log.slice().sort(function(a,b){return new Date(a.t) - new Date(b.t);});
  var hasData = sorted.length > 0;

  var sortedInRange = sorted.filter(function(r){var t = new Date(r.t).getTime(); return t >= winStartMs && t <= winEndMs;});
  var last = sorted.length ? sorted[sorted.length-1] : null;

/* ── BodyEntryForm: modale per aggiungere/modificare una misurazione ──
   Peso pre-popolato dal profilo (in modo che non si debba riscrivere).
   Altezza presa dal profilo (per BMI calcolato live). BMI mostrato in alto come anteprima. */
function BodyEntryForm(p){
  var initial = p.initial || {};
  var profile = p.profile || null;
  var altezzaCm = profile && profile.altezza ? parseFloat(String(profile.altezza).replace(',','.')) : null;
  /* Se è una nuova misurazione, pre-popola peso da profilo */
  var defaults = {date: initial.t ? initial.t.slice(0,10) : todayISO()};
  if(!initial.id && profile && profile.peso && (initial.peso === undefined || initial.peso === null || initial.peso === '')){
    var pesoProf = parseFloat(String(profile.peso).replace(',','.'));
    if(!isNaN(pesoProf) && pesoProf > 0) defaults.peso = pesoProf;
  }
  var _f = useState(Object.assign({}, initial, defaults));
  var form = _f[0]; var setForm = _f[1];
  useEffect(function(){lockScroll();return unlockScroll;},[]);
  function set(k, v){ setForm(function(prev){var u=Object.assign({},prev);u[k]=v;return u;}); }
  var inp = {width:'100%',background:'transparent',border:'1px solid '+BORD,borderRadius:6,padding:'7px 8px',color:TEXT,fontFamily:"'Roboto Mono',monospace",fontSize:13,textAlign:'right',fontVariantNumeric:'tabular-nums'};

  /* BMI live: si aggiorna mentre digiti il peso */
  var liveBmi = calcBmi(form.peso, altezzaCm);
  var liveBmiCat = bmiCategory(liveBmi);

  function submit(){
    var entry = {};
    BODY_FIELDS.forEach(function(f){
      var v = form[f.k];
      if(v !== undefined && v !== null && v !== ''){
        var n = parseFloat(String(v).replace(',','.'));
        if(!isNaN(n)) entry[f.k] = n;
      }
    });
    if(form.note && form.note.trim()) entry.note = form.note.trim();
    if(form.date){
      var d = new Date(form.date + 'T12:00:00');
      if(!isNaN(d.getTime())) entry.t = d.toISOString();
    }
    if(Object.keys(entry).length === 0){ alert('Inserisci almeno un valore.'); return; }
    p.onSave(entry);
  }
  function field(f){
    return h('div',{key:f.k,style:{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:'0.5px solid '+BORD}},
      h('div',{style:{flex:1,fontSize:13}}, f.lbl),
      h('input',{
        type:'text', inputMode:'decimal', pattern:'[0-9]*[.,]?[0-9]*',
        value: form[f.k]!==undefined && form[f.k]!==null ? String(form[f.k]).replace('.',',') : '',

        onFocus:function(e){e.target.select();},
        onChange:function(e){set(f.k, e.target.value.replace(',','.'));},
        style:Object.assign({},inp,{maxWidth:100})
      }),
      h('div',{style:{minWidth:34,fontSize:11,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}, f.unit)
    );
  }

  return h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.92)',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'},onClick:function(e){if(e.target===e.currentTarget)p.onClose();}},
    h('div',{className:'su',style:{width:'100%',maxWidth:440,background:SURF,borderRadius:'20px 20px 0 0',padding:'18px 16px 28px',maxHeight:'92vh',overflowY:'auto'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
        h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:'0.02em'}}, initial && initial.id ? 'Modifica misurazione' : 'Nuova misurazione'),
        h('button',{onClick:p.onClose,'aria-label':'Chiudi',style:{background:'none',border:'none',color:MUTED,cursor:'pointer'}}, h(Icon,{n:'close',sz:20,c:MUTED}))
      ),
      h('div',{style:{fontSize:12,color:MUTED,marginBottom:14,lineHeight:1.45}}, 'Peso pre-popolato dal profilo. Altezza e data di nascita arrivano dalle Impostazioni. Tutti gli altri campi sono opzionali.'),
      /* BMI live preview */
      liveBmi != null && h('div',{style:{background:ACC5,border:'1px solid '+ACC3,borderRadius:10,padding:'10px 12px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          h('div',{style:{fontSize:10,color:ACC,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:2}},'BMI calcolato'),
          h('div',{style:{fontSize:11,color:MUTED}}, 'peso / altezza² = '+liveBmi+' kg/m²')
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:30,letterSpacing:'0.02em',color:ACC,lineHeight:1}}, liveBmi),
          liveBmiCat && h('div',{style:{fontSize:9,color:liveBmiCat.color,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',marginTop:2}}, liveBmiCat.label)
        )

      h('textarea',{value:form.note||'',onChange:function(e){set('note',e.target.value);},rows:2,placeholder:'Sensazioni, condizioni, dieta…',style:{width:'100%',background:SURF2,border:'1px solid '+BORD,borderRadius:8,padding:'9px 12px',color:TEXT,fontSize:13,marginBottom:14,resize:'vertical',fontFamily:'inherit'}}),

  var attiveCount=schede.filter(function(s){return s.attiva;}).length;
  function duplica(sc){
    hap(15);
    var copy = JSON.parse(JSON.stringify(sc));
    copy.id = 'sc_'+uid();
    copy.nome = sc.nome + ' (copia)';
    copy.attiva = false;
    copy.data = new Date().toISOString();
    (copy.blocchi||[]).forEach(function(b){
      b.id = 'bl_'+uid();
      (b.es||[]).forEach(function(e){ e.id = uid(); });
    });
    setSchede(function(prev){ return prev.concat([copy]); });
  }

    if(!confirm('Eliminare "'+sc.nome+'"?')) return;
    setSchede(function(prev){ return softDelete(prev, sc.id); });

      )

            h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:2,flexWrap:'wrap'}},

/* ── PROMEMORIA SETTIMANALI ──
   Memo che l'utente vuole vedere sulla dashboard: appuntamenti col nutrizionista,
   giorni di chiusura palestra, assenza coach, eventi vari. Storage localStorage.
   I tipi sono colorati così l'utente li identifica a colpo d'occhio sulla home. */
/* Target settimanali per disciplina: opzionale. Se null, si usa profile.giorniTarget totale.
   Storage locale (no DB) per non richiedere schema changes. */
var TARGET_BD_KEY = 'pumplog_target_breakdown';
function loadTargetBreakdown(){
  try{ return JSON.parse(localStorage.getItem(TARGET_BD_KEY)||'null'); }catch(e){ return null; }
}
function saveTargetBreakdown(obj){
  try{
    if(obj === null) localStorage.removeItem(TARGET_BD_KEY);

/* Calcola la data della prossima occorrenza per un promemoria ricorrente settimanale.
   Per i one-shot ritorna la data originale. */
function nextOccurrence(r, fromDate){
  var base = new Date(r.date);
  base.setHours(0,0,0,0);
  if(!r.recurring || r.recurring==='none') return base;
  if(r.recurring==='weekly'){
    var now = new Date(fromDate||Date.now());
    now.setHours(0,0,0,0);
    if(base >= now) return base;
    var diffDays = Math.floor((now - base)/86400000);
    var addWeeks = Math.ceil((diffDays+1)/7);
    var next = new Date(base);
    next.setDate(base.getDate() + addWeeks*7);
    return next;
  }
  return base;
}

/* Splash hide + Service Worker registration */
window.addEventListener('load', function(){

          var bar = document.createElement('div');
          bar.id = 'gt-update-banner';
          bar.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--acc);color:var(--act);padding:12px 18px;border-radius:12px;display:flex;gap:14px;align-items:center;z-index:10000;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:Barlow,sans-serif;font-size:13px;font-weight:600;max-width:calc(100% - 32px)';
          var msgSpan = document.createElement('span');
          msgSpan.textContent = 'Nuova versione disponibile';
          bar.appendChild(msgSpan);
          var btn = document.createElement('button');
          btn.textContent = 'Aggiorna';
          btn.style.cssText = 'background:var(--act);color:var(--acc);border:none;padding:7px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;letter-spacing:0.04em;text-transform:uppercase';
