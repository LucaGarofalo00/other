<style>
/* === DESIGN SYSTEM TOKENS === */
:root{
  /* Accent (themable) */
  --acc:#C8FF00;
  --acc2:rgba(200,255,0,0.13);
  --acc3:rgba(200,255,0,0.20);
  --acc5:rgba(200,255,0,0.09);
  --act:#000;
  /* Neutrals */
  --bg:#0C0C0D;
  --surf-1:#161618;
  --surf-2:#202022;
  --surf-3:#2A2A2D;
  --bord-1:rgba(255,255,255,0.06);
  --bord-2:rgba(255,255,255,0.10);
  --text:#F0EFE8;
  --muted:rgba(240,239,232,0.55);
  --muted-2:rgba(240,239,232,0.32);
  /* Semantic */
  --danger:#EF4444;
  --danger-bg:rgba(239,68,68,0.10);
  --danger-bord:rgba(239,68,68,0.30);
  --success:#22C55E;
  --warning:#F59E0B;
  /* Spacing */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  /* Radius */
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-xl:20px; --r-full:999px;
  /* Type */
  --f-display:'Bebas Neue',cursive;
  --f-cond:'Barlow Condensed',sans-serif;
  --f-body:'Barlow',sans-serif;
  --f-mono:'Roboto Mono',monospace;
}

/* === RESET === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);font-family:var(--f-body);
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums;
}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
/* date input: rimuove lo styling nativo iOS Safari che faceva uscire l'input dal contenitore */
input[type=date]{-webkit-appearance:none;appearance:none;max-width:100%;min-height:46px}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7) brightness(1.3);cursor:pointer;padding:0;margin-left:6px}
textarea,input,button{outline:none;font-family:var(--f-body)}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation;cursor:pointer;border:none;background:none;color:inherit;font:inherit}
::-webkit-scrollbar{width:0;height:0}

/* === MODAL SCROLL LOCK (iOS Safari fix) === */
body.modal-open{overflow:hidden;position:fixed;width:100%;top:var(--scroll-y,0)}

/* === TYPOGRAPHY HELPERS === */
.dN{font-family:var(--f-display)}
.mN{font-family:var(--f-mono);font-variant-numeric:tabular-nums}
.bC{font-family:var(--f-cond)}
.num{font-family:var(--f-mono);font-variant-numeric:tabular-nums;font-weight:700}

/* === INTERACTION STATES === */
button,[role=button]{transition:transform .12s ease,filter .12s ease,background .12s ease}
button:active:not(:disabled),[role=button]:active{transform:scale(0.96)}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{
  outline:2px solid var(--acc);outline-offset:2px;border-radius:var(--r-sm)
}
.card-tap{transition:transform .12s ease,background .15s ease}
.card-tap:active{transform:scale(0.985)}
input:focus,textarea:focus{border-color:var(--acc) !important}

/* === ANIMATIONS === */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes prBurst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(0.95)}
}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes logoIntro{0%{transform:scale(0.94);opacity:0}60%{transform:scale(1.02);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes logoBreath{0%,100%{box-shadow:0 8px 24px var(--acc3)}50%{box-shadow:0 8px 32px var(--acc),0 0 0 4px var(--acc5)}}
.gt-logo-pulse{animation:logoIntro .42s cubic-bezier(.2,.8,.2,1),logoBreath 3.4s ease-in-out 0.6s infinite}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.gt-stat-num{animation:countUp .45s cubic-bezier(.2,.8,.2,1)}
@keyframes activeGlow{0%,100%{box-shadow:0 0 0 0 var(--acc5)}50%{box-shadow:0 0 0 6px var(--acc5)}}
.gt-scheda-active{animation:activeGlow 2.8s ease-in-out infinite}
.su{animation:slideUp .25s ease-out}
.fi{animation:fadeIn .2s ease-out}
.pr-burst{
  position:fixed;top:38%;left:50%;
  padding:20px 40px;background:var(--acc);color:var(--act);
  border-radius:var(--r-xl);
  font:32px/1 var(--f-display);letter-spacing:0.05em;
  z-index:999;pointer-events:none;
  box-shadow:0 12px 48px rgba(200,255,0,0.4);
  animation:prBurst 1.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.toast{animation:toastIn .25s ease-out}
.timer-alert{animation:shake .3s ease-in-out 3, timerPulse 1s ease-in-out infinite}

/* === iOS PWA: safe area === */
@supports (padding: max(0px)) {
  @media (display-mode: standalone) {

}

/* === SPLASH === */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash .mark{position:relative;display:flex;align-items:baseline;gap:2px;margin-bottom:12px}
#splash .mark .letter{font-family:var(--f-display);font-size:96px;line-height:0.85;color:var(--text);letter-spacing:-0.04em}
#splash .mark .letter.accent{color:var(--acc)}
#splash .mark .bar{position:absolute;bottom:-8px;left:0;right:0;height:6px;background:var(--acc);border-radius:3px;animation:loadBar 1.4s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes loadBar{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}51%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
#splash .name{font-family:var(--f-cond);font-size:13px;letter-spacing:0.25em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:10px}
#splash .subtitle{font-family:var(--f-body);font-size:11px;color:var(--muted-2);margin-top:6px;letter-spacing:0.02em}
</style>
</head>

var _scrollLockCount = 0;
function lockScroll(){
  if(_scrollLockCount === 0){
    document.body.style.setProperty('--scroll-y', '-' + window.scrollY + 'px');
    document.body.classList.add('modal-open');
  }
  _scrollLockCount++;
}
function unlockScroll(){
  _scrollLockCount = Math.max(0, _scrollLockCount - 1);
  if(_scrollLockCount === 0){
    document.body.classList.remove('modal-open');

/* Wake Lock helper — tiene lo schermo acceso durante la sessione */
function useWakeLock(active){
  useEffect(function(){
    if(!active) return;
    var wl = null;
    var cancelled = false;
    var onVis = function(){
      if(!document.hidden && wl === null && !cancelled){
        navigator.wakeLock.request('screen').then(function(l){
          if(cancelled){l.release().catch(function(){});return;}
          wl = l;
        }).catch(function(){});
      }
    };
    if('wakeLock' in navigator){
      navigator.wakeLock.request('screen').then(function(lock){
        if(cancelled){lock.release().catch(function(){});return;}
        wl = lock;
        document.addEventListener('visibilitychange', onVis);
      }).catch(function(){});
    }
    return function(){
      cancelled = true;
      document.removeEventListener('visibilitychange', onVis);
      if(wl){ wl.release().catch(function(){}); wl = null; }
    };

}

/* Rest timer hook — ancorato a Date.now() per sopravvivere a lock screen / throttling iOS.
   Ritorna [tmr, startRest, stopRest]. Il timer parte già con endsAt impostato, così
   l'effect dep `tmr.endsAt` cambia (null → timestamp) e il tick parte subito. */
function useRestTimer(){
  var _s = useState(null);
  var tmr = _s[0]; var setTmr = _s[1];

  useEffect(function(){
    if(!tmr || !tmr.endsAt) return;
    var endsAt = tmr.endsAt;
    var alerted = tmr.s <= 0;
    function tick(){
      var remaining = Math.max(0, Math.round((endsAt - Date.now())/1000));
      setTmr(function(t){ return t && t.endsAt === endsAt ? Object.assign({}, t, {s: remaining}) : t; });
      if(remaining <= 0 && !alerted){
        alerted = true;
        hap([100, 50, 100, 50, 250]);
        cancelTimerNotify();
        try{
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.frequency.value = 880; g.gain.value = 0.15;
          osc.start(); osc.stop(ctx.currentTime + 0.18);
          setTimeout(function(){ ctx.close && ctx.close(); }, 300);
        }catch(e){}
      }
    }
    tick();
    var id = setInterval(tick, 500);
    var onVis = function(){ if(!document.hidden) tick(); };
    document.addEventListener('visibilitychange', onVis);
    return function(){
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [tmr && tmr.endsAt]);

  var startRest = useCallback(function(seconds, label){
    if(!seconds || seconds <= 0) return;
    ensureNotifPermission();
    notifyTimer(seconds, label || 'Recupero finito');
    setTmr({s: seconds, max: seconds, label: label || 'Recupero', endsAt: Date.now() + seconds*1000});
  }, []);

  var stopRest = useCallback(function(){
    setTmr(null);
    cancelTimerNotify();
  }, []);

  return [tmr, startRest, stopRest];
}

/* e1RM (1-rep max stimato) — formula Epley (default) o Brzycki */
function e1RM(peso, reps){
  if(!peso || !reps) return 0;
  if(reps <= 1) return peso;
  // Epley: 1RM = peso × (1 + reps/30)
  return Math.round(peso * (1 + reps/30));
}

/* Completion rate di una sessione: quante serie completate vs totali (0-100) */
function sessionCompletionRate(session){
  if(!session) return 0;
  /* Cardio: una sessione cardio loggata è "completata" per definizione (non ha serie da spuntare) */
  if(session.tipo === 'cardio') return 100;
  if(!session.es||!session.es.length) return 0;
  var totalSets=0, doneSets=0;
  session.es.forEach(function(e){
    if(e.tipo==='riscaldamento'){
      totalSets++; if(e.fatto) doneSets++;
    } else {
      var serie=e.serie||[];
      totalSets+=serie.length;
      doneSets+=serie.filter(function(s){return s.ok;}).length;
    }
  });
  if(totalSets===0) return 100;
  return Math.round(doneSets/totalSets*100);
}
function completionLabel(rate){
  if(rate>=100) return {text:'Completato',color:'var(--success)',icon:'check-circle'};
  if(rate>=50) return {text:rate+'%',color:'var(--warning)',icon:'alert'};
  return {text:rate+'%',color:'var(--danger)',icon:'x-circle'};
}

/* Weekly adherence: confronta sessioni fatte vs obiettivo settimanale */
function getWeekSessions(sessions, weekStartDate){
  var start=new Date(weekStartDate); start.setHours(0,0,0,0);
  var end=new Date(start); end.setDate(end.getDate()+7);
  return sessions.filter(function(s){var d=new Date(s.t0);return d>=start&&d<end;});
}
function getWeekStart(date){
  var d=new Date(date); var day=d.getDay(); var diff=day===0?6:day-1;
  d.setDate(d.getDate()-diff); d.setHours(0,0,0,0); return d;
}
function getAdherenceWeeks(sessions, numWeeks){
  var weeks=[];
  var now=new Date();
  var currentWeekStart=getWeekStart(now);
  for(var i=0;i<numWeeks;i++){
    var ws=new Date(currentWeekStart);
    ws.setDate(ws.getDate()-i*7);
    var weekSess=getWeekSessions(sessions,ws);
    weeks.unshift({start:ws,sessions:weekSess,count:weekSess.length});
  }
  return weeks;
}
function getDayTrainingMap(sessions, weekStartDate){
  var map=[false,false,false,false,false,false,false];
  var start=new Date(weekStartDate); start.setHours(0,0,0,0);
  sessions.forEach(function(s){
    var d=new Date(s.t0);
    var ws=getWeekStart(d);
    if(ws.getTime()===start.getTime()){
      var day=d.getDay();
      var idx=day===0?6:day-1;
      map[idx]=true;
    }
  });
  return map;
}

/* PR detection: trova il miglior tonnellaggio per serie (peso×reps) o e1RM mai fatto per quell'esercizio */
function findBestSerie(esNome, allSessions, excludeSessionId){
  var bestVol = 0, bestE1 = 0;
  allSessions.forEach(function(s){
    if(excludeSessionId && s.id === excludeSessionId) return;
    s.es && s.es.forEach(function(e){
      if(e.nome !== esNome) return;
      (e.serie||[]).forEach(function(sr){
        if(!sr.ok) return;
        var vol = (sr.peso||0) * (sr.reps||0);
        var est = e1RM(sr.peso||0, sr.reps||0);
        if(vol > bestVol) bestVol = vol;
        if(est > bestE1) bestE1 = est;
      });
    });
  });
  return {vol: bestVol, e1: bestE1};
}

/* Trova l'ultima sessione (in ordine cronologico decrescente) in cui è stato eseguito l'esercizio.
   Cerca su tutte le sessioni — incluse quelle di schede ora inattive — perché servono come
   riferimento per sapere "come è andata l'ultima volta" indipendentemente dalla scheda attiva. */
function findLastExerciseSession(esNome, allSessions, excludeSessionId){
  if(!esNome || !allSessions) return null;
  var sorted = allSessions.slice().sort(function(a,b){
    return new Date(b.t0) - new Date(a.t0);
  });
  for(var i=0;i<sorted.length;i++){
    var s = sorted[i];
    if(excludeSessionId && s.id === excludeSessionId) continue;
    var expanded = expandSupersetEs(s.es || []);
    for(var j=0;j<expanded.length;j++){
      var e = expanded[j];
      if(e.nome !== esNome) continue;
      var done = (e.serie||[]).filter(function(sr){return sr.ok;});
      if(done.length > 0){
        return {session: s, es: e, serie: done, note: s.nota || '', t0: s.t0};
      }
    }
  }
  return null;
}

/* Calcola trend (up/down/flat) per serie temporale di {v:number}.
   Usa il delta cumulativo first → last in % per evitare oscillazioni casuali. */
function computeTrend(points){
  if(!points || points.length < 2) return {dir:'flat', pct:0, delta:0};
  var first = points[0].v, last = points[points.length-1].v;
  var delta = last - first;
  if(!first) return {dir: delta>0?'up':(delta<0?'down':'flat'), pct: 0, delta: delta};
  var pct = (delta / first) * 100;
  /* Soglia 3%: sotto è "stallo", oltre è trend reale */
  if(Math.abs(pct) < 3) return {dir:'flat', pct:pct, delta:delta};
  return {dir: pct > 0 ? 'up' : 'down', pct: pct, delta: delta};
}

/* === TIME RANGE NAVIGATOR ===
   Finestre calendar-anchored: la freccia "indietro" scorre del passo della finestra
   (1 settimana → settimana precedente, 1 anno → anno precedente, ecc.).
   offset=0 = finestra che contiene oggi. offset>0 = finestre passate. */
var TIME_RANGES = [
  {k:'1s', short:'1 sett.', long:'1 settimana'},
  {k:'1m', short:'1 mese',  long:'1 mese'},
  {k:'3m', short:'3 mesi',  long:'3 mesi'},
  {k:'6m', short:'6 mesi',  long:'6 mesi'},

var IT_MONTH_FULL  = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function getCalendarWindow(rangeKey, offset){
  var now = new Date();
  if(rangeKey === '1s'){
    var ws = getWeekStart(now);
    ws = new Date(ws.getTime() - offset*7*86400000);
    var we = new Date(ws); we.setDate(we.getDate()+6); we.setHours(23,59,59,999);
    return {start:ws, end:we};
  }
  if(rangeKey === '1m'){
    var s = new Date(now.getFullYear(), now.getMonth()-offset, 1, 0,0,0,0);
    var e = new Date(s.getFullYear(), s.getMonth()+1, 0, 23,59,59,999);
    return {start:s, end:e};
  }
  if(rangeKey === '3m'){
    var curQ = Math.floor(now.getMonth()/3);
    var s = new Date(now.getFullYear(), curQ*3 - offset*3, 1, 0,0,0,0);
    var e = new Date(s.getFullYear(), s.getMonth()+3, 0, 23,59,59,999);
    return {start:s, end:e};
  }
  if(rangeKey === '6m'){
    var curH = Math.floor(now.getMonth()/6);
    var s = new Date(now.getFullYear(), curH*6 - offset*6, 1, 0,0,0,0);
    var e = new Date(s.getFullYear(), s.getMonth()+6, 0, 23,59,59,999);
    return {start:s, end:e};
  }
  /* '1a' */
  var s = new Date(now.getFullYear()-offset, 0, 1, 0,0,0,0);
  var e = new Date(s.getFullYear(), 11, 31, 23,59,59,999);
  return {start:s, end:e};
}
function formatCalendarLabel(rangeKey, w){
  var s = w.start, e = w.end;
  if(rangeKey === '1s'){
    var currentMonday = getWeekStart(new Date()).getTime();
    if(s.getTime() === currentMonday) return 'Questa settimana';
    if(s.getTime() === currentMonday - 7*86400000) return 'Settimana scorsa';
    if(s.getMonth() === e.getMonth() && s.getFullYear() === e.getFullYear()){
      return s.getDate()+'-'+e.getDate()+' '+IT_MONTH_SHORT[e.getMonth()]+' '+e.getFullYear();
    }
    return s.getDate()+' '+IT_MONTH_SHORT[s.getMonth()]+' - '+e.getDate()+' '+IT_MONTH_SHORT[e.getMonth()]+' '+e.getFullYear();
  }
  if(rangeKey === '1m'){
    return IT_MONTH_FULL[s.getMonth()]+' '+s.getFullYear();
  }
  if(rangeKey === '3m'){
    return IT_MONTH_SHORT[s.getMonth()]+'-'+IT_MONTH_SHORT[e.getMonth()]+' '+e.getFullYear();
  }
  if(rangeKey === '6m'){
    return IT_MONTH_SHORT[s.getMonth()]+'-'+IT_MONTH_SHORT[e.getMonth()]+' '+e.getFullYear();
  }
  return String(s.getFullYear());
}

/* === B9: SYNC CONFLICT RESOLUTION === */
/* Ogni record (sessione, scheda) ha lastModified. Per merge: tieni quello più recente.
   I record cancellati diventano tombstone (deleted:true, deletedAt) per propagare la cancellazione
   tra dispositivi. Tombstone più vecchi di TOMBSTONE_TTL_DAYS vengono ripuliti. */

var TOMBSTONE_TTL_DAYS = 30;

function touchRecord(r){
  if(!r) return r;
  return Object.assign({}, r, {lastModified: Date.now()});
}

function touchAll(arr){ return (arr||[]).map(touchRecord); }

/* Soft-delete: marca come tombstone invece di rimuovere */
function softDelete(arr, id){
  return (arr||[]).map(function(r){
    if(r.id !== id) return r;
    return Object.assign({}, r, {deleted: true, deletedAt: Date.now(), lastModified: Date.now()});
  });
}

/* Filtra i tombstone per le query UI (Home, Log, Stats non li vedono) */
function liveRecords(arr){
  return (arr||[]).filter(function(r){ return !r.deleted; });
}

/* Pulisce tombstone vecchi (chiamato in save) */
function pruneTombstones(arr){
  var cutoff = Date.now() - TOMBSTONE_TTL_DAYS * 86400000;
  return (arr||[]).filter(function(r){
    return !(r.deleted && r.deletedAt && r.deletedAt < cutoff);
  });
}

/* Merge intelligente: per ogni id, tieni il record con lastModified più recente.
   Se uno dei due è tombstone, il tombstone "vince" se è più recente. */
function mergeRecords(local, remote){
  var byId = {};
  (local||[]).forEach(function(r){ if(r && r.id) byId[r.id] = r; });
  (remote||[]).forEach(function(r){
    if(!r || !r.id) return;
    var existing = byId[r.id];
    if(!existing){ byId[r.id] = r; return; }
    var lLM = existing.lastModified || 0;
    var rLM = r.lastModified || 0;
    // Se mancano timestamp da entrambe le parti, preferisci il locale (conservativo)
    if(rLM > lLM) byId[r.id] = r;
  });
  return Object.values(byId);
}

function mergeData(local, remote){
  return {
    schede: pruneTombstones(mergeRecords(local.schede||[], remote.schede||[])),
    sessions: pruneTombstones(mergeRecords(local.sessions||[], remote.sessions||[])),
    profile: pickNewer(local.profile, remote.profile)
  };
}
function pickNewer(a, b){
  if(!a) return b; if(!b) return a;
  var aLM = a.lastModified || 0, bLM = b.lastModified || 0;
  return bLM > aLM ? b : a;
}

function findCalSkill(nome){
  if(!nome) return null;
  var n = nome.toLowerCase();
  for(var i=0;i<CAL_CATALOG.length;i++){
    var cat = CAL_CATALOG[i];
    for(var j=0;j<cat.es.length;j++){
      if(cat.es[j].n.toLowerCase() === n){
        return Object.assign({}, cat.es[j], {category: cat.label, categoryId: cat.id});
      }
    }
  }
  return null;
}

function muscleGroupOf(name){
  if(!name)return null;
  var n=name.toLowerCase();
  for(var i=0;i<MUSCLE_GROUPS.length;i++){
    var g=MUSCLE_GROUPS[i];

var TIPS={'Panca Piana':{exec:'Scapole retratte e bloccate, schiena arcuata, barra tocca il basso del petto. Spingi in traiettoria leggermente diagonale.',prog:'In stallo? Prova 5×5 con 90% del max. Aggiungi pausa 2s al petto per spezzare il punto morto.',motto:'Un kg in più sulla panca è la prova concreta che stai crescendo.'},'Squat':{exec:'Petto alto, core braced, ginocchia in linea con le punte. Scendi sotto il parallelo, sguardo avanti.',prog:'Pause squat (3s in fondo) rompono qualsiasi plateau. Prova anche front squat per variare.',motto:'Lo squat costruisce gambe, core e carattere. Nulla lo sostituisce.'},'Stacco da Terra':{exec:'Barra sopra le dita dei piedi, schiena neutra, braccia verticali. Spingi il pavimento, non tirare.',prog:'Deficit deadlift (+3cm) allarga il ROM e rompe gli stalli. Usa cinghie per superare il grip.',motto:'Il deadlift rivela la tua forza vera. Rispettalo e allenalo seriamente.'},'Stacco Rumeno':{exec:'Schiena neutra, barra scorre vicino alle gambe, spingi i fianchi indietro. Non è uno squat.',prog:'Single-leg RDL corregge i squilibri tra i lati. Pausa a metà per attivare meglio.',motto:'La catena posteriore è la tua superpotenza. Costruiscila.'},'Trazioni':{exec:'Partenza da braccia estese. Tira scapole giù e indietro prima dei gomiti. Petto verso la barra.',prog:'Non riesci ancora? Serie negative 5s. Ne fai 15+? Aggiungi peso con la cintura.',motto:'Ogni trazioni è una battaglia vinta contro la gravità. Combatti.'},'Rematore Bilanciere':{exec:'Busto quasi parallelo al suolo, barra tirata verso il basso addome, scapole retratte in cima.',prog:'Prova il Pendlay row (parte da terra ogni rep) per eliminare lo slancio totalmente.',motto:'Una schiena forte è la base di ogni sollevamento pesante.'},'Lento Avanti':{exec:'Core stabile, non arcuare la bassa schiena. Barra in linea con le orecchie sopra la testa.',prog:'Alterna manubri e bilanciere. I manubri correggono gli squilibri e aumentano il ROM.',motto:'Spalle forti trasformano la silhouette da ogni angolazione.'},'Alzate Laterali':{exec:'Leggera flessione al gomito, alza fino alla larghezza spalle. Nessuno slancio. Controlla la discesa.',prog:'2s su, 3s giù. La tensione conta più del peso. Prova dropset fino al cedimento.',motto:'Le alzate costanti costruiscono le spalle che vuoi.'},'Hip Thrust':{exec:'Schiena sull\'anca della panca, imbottitura sulla barra. Spingi forte con i glutei, non con la schiena.',prog:'Mini-band sopra le ginocchia attiva i glutei medi. Pausa 1s in cima per più contrazione.',motto:'Glutei forti proteggono la schiena e potenziano tutto il corpo.'},'Leg Press':{exec:'Piedi alti per femorali, bassi per quadricipiti. Non bloccare le ginocchia in estensione.',prog:'Dropset fino al cedimento: riduci il peso senza pausa. Pausa 3s in basso per più stimolo.',motto:'Le gambe forti sono la base di ogni tipo di atletismo.'},'Curl Bilanciere':{exec:'Gomiti fissi ai fianchi. Contrai il bicipite in cima, abbassa lentamente in 3-4 secondi.',prog:'Metodo 21: 7 reps metà bassa + 7 metà alta + 7 complete. Intensità senza aumentare il peso.',motto:'I bicipiti si costruiscono con la costanza, non con la fretta.'},'French Press':{exec:'Gomiti verso il soffitto, non allargarli. Abbassa la barra verso la fronte controllato.',prog:'Prova al cavo basso per tensione costante. Skull crusher EZ bar è più ergonomico.',motto:'I tricipiti sono 2/3 del braccio. Dagli la priorità che meritano.'},'Pull-up':{exec:'Partenza da braccia estese. Tira le scapole giù prima dei gomiti. Petto verso la barra.',prog:'Non riesci? Negatives 5s. Ne fai 15+? Aggiungi peso alla cintura. Chin-ups per variare.',motto:'Ogni pull-up è una conversazione con la gravità. Fai tu il primo passo.'},'Dip':{exec:'Busto in avanti per il petto, verticale per i tricipiti. Abbassa fino a 90° al gomito.',prog:'Non riesci? Macchina assistita. Ne fai 15+? Aggiungi peso. Ring dip per instabilità.',motto:'I dip combinano petto, spalle e tricipiti. Uno strumento potente.'},'Push-up':{exec:'Mani sotto le spalle, corpo dritto, petto sfiora il suolo. Spingi completamente.',prog:'Progressioni: inclinato → standard → pike → archer → pseudo planche → monobraccio.',motto:'Il push-up è il test universale della forza funzionale.'},'Plank':{exec:'Corpo dritto dalla testa ai talloni. Contrai addome, glutei e quadricipiti. Respira normalmente.',prog:'Plank dinamico: solleva un braccio alternato. Poi prova il plank con pesi sul dorso.',motto:'Il core è l\'origine di ogni forza. Mantienilo sempre forte.'},
'Panca piana multipower':{exec:'Scapole retratte e bloccate prima di abbassare il bilanciere. La guida del multipower è verticale: assicurati che la barra tocchi il basso del petto, non la gola. Mai sbloccare le scapole durante il movimento.',prog:'Con la progressione in scheda, aumenta prima il volume poi il carico. Pausa 2s al petto per spezzare il punto morto nelle settimane pesanti.',motto:'La coerenza sulla panca costruisce un petto solido. Rispetta la progressione.'},
'Croci alla macchina':{exec:'Regola il sedile: le impugnature al livello del petto, gomiti leggermente flessi fissi. Chiudi davanti senza sbattere le mani. Controlla la fase di ritorno in 3-4 secondi — è lì che avvengono i danni.',prog:'Pausa 2s al picco della contrazione per più ipertrofia. Dropset fino al cedimento come tecnica intensificatrice.',motto:'Il petto si costruisce con la contrazione, non col peso mosso.'},
'Alzate laterali manubri':{exec:'Leggera flessione al gomito, alza fino alla larghezza delle spalle. Nessuno slancio: se oscilli il busto, il peso è troppo. Il controllo nella discesa (3s) è la metà del lavoro.',prog:'2s su, 3s giù. La tensione conta più del peso. Dropset fino al cedimento per più volume sulle spalle.',motto:'Le alzate costanti costruiscono le spalle che vuoi.'},

'Pulley presa neutra spalle':{exec:'Seduto eretto, non inclinarti indietro. Tira verso il basso addome, scapole retratte in cima. Ritorno lento e controllato — non lasciare che il peso si riprenda la postura. Gomiti vicini al busto.',prog:'Pausa 1s in contrazione massima. Riduci il peso e aumenta il TUT (tempo sotto tensione) per variare lo stimolo.',motto:'Una schiena forte è la base di ogni sollevamento pesante.'},
'Pulldown corda cavo alto':{exec:'Dividi la corda verso i lati del viso. Gomiti che scendono oltre le spalle. Busto fermo, non oscillare. Il movimento viene dai gomiti, non dalle mani.',prog:'Più reps controllate battono più peso con slancio. Prova con pausa 2s a fine movimento per massimizzare la contrazione del tricipite laterale.',motto:'Qualità sopra quantità. Sempre.'},
'Curl manubri panca 45°':{exec:'La panca inclinata allunga il bicipite in partenza: vantaggio meccanico unico — sfruttalo. Gomiti fermi, non portarli avanti. Supina il polso in cima alla contrazione. Nessuno slancio.',prog:'Lavora a 2s su e 3s giù. Non caricare più del necessario: la forma è tutto su questo angolo.',motto:'Il bicipite allungato si ipertrofizza meglio. Rispetta l\'angolo.'},
'French press manubri':{exec:'Gomiti puntati verso il soffitto per tutta la serie — non lasciarli allargarsi. Abbassa i manubri verso le orecchie in modo controllato. Nessun rimbalzo in fondo: rischio al gomito.',prog:'Prova con un manubrio unico a due mani per una presa più stabile. Pausa 1s in fondo per più ROM.',motto:'I tricipiti sono 2/3 del braccio. Dagli la priorità che meritano.'},
'Dragon flag':{exec:'Testa, spalle e braccia incollate alla panca. Abbassa il corpo rigido come un\'asse: se i fianchi cedono, fermati. Core completamente contratto in ogni fase. Scendi lento (3-4s), sali controllato.',prog:'Inizia con le ginocchia piegate (tuck dragon flag). Aumenta il ROM progressivamente man mano che la forza del core cresce.',motto:'Il dragon flag non perdona chi cede al core. Vai lento o non andare.'},
'Crunch inversi a terra':{exec:'Schiena bassa incollata al pavimento per tutto il movimento. Solleva il bacino usando gli addominali, non lo slancio delle gambe. Espira nella salita, inspira nella discesa. Gambe perpendicolari al suolo in partenza.',prog:'Prova con gambe più tese per aumentare il carico sul core. In futuro aggiungi peso alle caviglie.',motto:'Il core si costruisce con la precisione, non con la velocità.'},
'V-ups gambe tese':{exec:'Gambe dritte, braccia verso i piedi. Togli la schiena bassa da terra nell\'incontro mani-piedi — non rimbalzare. Se la schiena si incurva eccessivamente, piega leggermente le ginocchia.',prog:'Inizia con ginocchia piegate. Quando padroneggi la forma, tendi le gambe. Max reps significa qualità fino all\'ultima ripetizione possibile.',motto:'Ogni ripetizione pulita vale tre fatte male.'},
'Hyperextension':{exec:'Bacino sul cuscinetto, non la pancia. Muoviti fino al parallelo con il pavimento — iperestendere oltre mette a rischio le lombari. Tieni il collo neutro, non sollevare la testa. Stringi i glutei in cima.',prog:'A corpo libero → mani al petto → mani dietro la testa → peso al petto. Progressione semplice e sicura.',motto:'La catena posteriore forte protegge ogni altro esercizio che fai.'},
'V-Squat':{exec:'Piedi a larghezza spalle sulla piattaforma inclinata. Schiena completamente appoggiata allo schienale, core attivo. Scendi finché le cosce sono parallele, ginocchia allineate con le punte — non verso l\'interno.',prog:'Segui la progressione in scheda. Il V-squat guida la traiettoria ma non elimina la tecnica: testa alta e core braced sempre.',motto:'Le gambe forti si costruiscono con pazienza e forma corretta.'},
'Stacchi rumeni manubri':{exec:'Schiena completamente neutra — non arrotondata. I manubri scorrono vicino alle gambe. Il movimento viene dai fianchi che spingono indietro, non dalla schiena che si abbassa. Ferma il movimento quando senti lo stiramento nei femorali.',prog:'Prova monopodalico per correggere squilibri tra lato destro e sinistro. Pausa a metà per attivare meglio.',motto:'La catena posteriore è la tua superpotenza. Costruiscila.'},

'Polpacci seduto':{exec:'Ginocchia a 90°: questo angolo attiva il soleo (la parte profonda del polpaccio). Range completo: tallone al massimo in basso, punta al massimo in alto. Nessun rimbalzo in fondo — il tendine d\'Achille ringrazia.',prog:'Alto volume, recuperi brevi: i polpacci rispondono alla fatica. Superserie seduto+piedi per colpire entrambi i fasci muscolari.',motto:'I polpacci rispondono al volume e alla costanza. Non alle scorciatoie.'},

/* ── memoria gruppo muscolare per esercizi personalizzati ──
   muscleGroupOf copre solo il catalogo; per gli esercizi custom memorizziamo qui (per nome,
   case-insensitive) il gruppo scelto dall'utente, così viene ripristinato la volta successiva
   e le statistiche di copertura restano corrette. Solo localStorage (per-dispositivo). */
var CGK='gymtracker_custom_gr';
function getCustomGroups(){try{return JSON.parse(localStorage.getItem(CGK))||{};}catch(e){return {};}}
function saveCustomGroups(obj){try{localStorage.setItem(CGK,JSON.stringify(obj||{}));}catch(e){}}
function rememberCustomGroup(name,gr){
  if(!name||!gr) return;
  if(muscleGroupOf(name)) return; /* in catalogo: già categorizzato, non serve memorizzare */
  var m=getCustomGroups();var k=String(name).trim().toLowerCase();
  if(m[k]===gr) return;
  m[k]=gr;saveCustomGroups(m);
  /* Sync cloud: la mappa viaggia come colonna JSONB custom_gr del profilo (best-effort,
     come skip_reasons/target_breakdown). pushProfileNow è hoisted, definito più sotto. */
  try{ pushProfileNow(); }catch(e){}
}
/* Risolve il gruppo muscolare: prima il catalogo, poi la memoria custom, altrimenti ''. */
function resolveGroup(name){
  if(!name) return '';
  var g=muscleGroupOf(name);if(g&&g.label) return g.label;
  return getCustomGroups()[String(name).trim().toLowerCase()]||'';
}
function getSugg(base,search,max){var freq=getFreq();var combined=base.slice();Object.keys(freq).forEach(function(n){if(combined.indexOf(n)<0)combined.push(n);});var filtered=search?combined.filter(function(n){return n.toLowerCase().indexOf(search.toLowerCase())>=0;}):combined;filtered.sort(function(a,b){return (freq[b]||0)-(freq[a]||0);});return filtered.slice(0,max||10);}
/* ── pulizia chiavi localStorage legacy (pre-cloud, v1.8.6) ──
   Eseguita una sola volta per device. Rimuove dati utente che potrebbero
   essere stati lasciati da installazioni precedenti, evitando leak cross-user
   se più persone usano la stessa app su un device condiviso.
   Sopravvivono solo: tema (TK), frequenza esercizi (FK), token Supabase. */
(function cleanupLegacyStorage(){
  try{
    if(localStorage.getItem('gymtracker_legacy_cleaned_v186')) return;
    var legacyKeys=['gymtracker_v9','gymtracker_profile','gymtracker_migrated_v1',
                    'gymtracker_token','gymtracker_gist_id'];
    legacyKeys.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    var snapKeys=[];
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k && k.indexOf('gymtracker_snap_')===0) snapKeys.push(k);
    }
    snapKeys.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    localStorage.setItem('gymtracker_legacy_cleaned_v186', new Date().toISOString());
  }catch(e){}
})();

function profileLocalToRow(p, userId){

  return {
    id: userId,
    nome: p.nome || null,
    data_nascita: p.dataNascita || null,
    peso: (p.peso === '' || p.peso == null) ? null : Number(p.peso),
    altezza: (p.altezza === '' || p.altezza == null) ? null : Number(p.altezza),
    obiettivo: p.obiettivo || null,
    livello: p.livello || null,
    giorni_target: (p.giorniTarget === '' || p.giorniTarget == null) ? null : Number(p.giorniTarget),
    theme: (function(){ try{ return loadTheme().id; }catch(e){ return 'lime'; } })(),
    freq: (function(){ try{ return getFreq(); }catch(e){ return {}; } })(),
    skip_reasons: (function(){ try{ return loadSkipReasons(); }catch(e){ return {}; } })(),
    reminders: (function(){ try{ return loadReminders(); }catch(e){ return []; } })(),
    target_breakdown: (function(){ try{ return loadTargetBreakdown(); }catch(e){ return null; } })(),
    custom_gr: (function(){ try{ return getCustomGroups(); }catch(e){ return {}; } })(),
    last_modified: p.lastModified || Date.now(),
    updated_at: new Date().toISOString()
  };
}

/* Riconosce l'errore PostgREST/Postgres "colonna inesistente" per una colonna specifica,
   così possiamo degradare con grazia se una migrazione opzionale non è stata ancora eseguita. */
function isMissingColumnError(err, col){
  if(!err) return false;
  var msg=((err.message||'')+' '+(err.details||'')+' '+(err.hint||'')).toLowerCase();
  var c=String(col).toLowerCase();
  if(msg.indexOf(c)<0) return false;
  return msg.indexOf('column')>=0 || msg.indexOf('schema cache')>=0 || err.code==='PGRST204' || err.code==='42703';
}
/* Una volta rilevata l'assenza della colonna custom_gr, evitiamo di reinviarla per la sessione. */
var _customGrColMissing = false;
async function sbPushProfile(profile){
  if(!sb || !profile) return;
  var user = await sbGetUser();
  if(!user) return;
  var row = profileLocalToRow(profile, user.id);
  if(_customGrColMissing) delete row.custom_gr;
  var r = await sb.from('profiles').upsert(row, { onConflict: 'id' });
  if(r.error){
    /* DB senza colonna custom_gr (migrazione opzionale non eseguita): riprova senza quel
       campo così la sync del resto del profilo continua a funzionare. */
    if(row.custom_gr !== undefined && isMissingColumnError(r.error, 'custom_gr')){
      _customGrColMissing = true;
      var row2 = Object.assign({}, row); delete row2.custom_gr;
      var r2 = await sb.from('profiles').upsert(row2, { onConflict: 'id' });
      if(r2.error) throw r2.error;
      return;
    }
    throw r.error;
  }
}
async function sbPushSchede(schede){

}

/* ── ADMIN WRITE/DELETE OPERATIONS ──
   Tutte queste richiedono le policy admin UPDATE/DELETE lato DB (vedi SQL).
   Le DELETE su schede/sessions sono soft-delete con tombstone, così il merge
   client-cloud propaga la cancellazione anche sui device dell'utente. */

async function adminUpdateProfile(userId, updates){
  if(!sb) throw new Error('Supabase non disponibile');
  var payload = Object.assign({}, updates, {
    last_modified: Date.now(),
    updated_at: new Date().toISOString()
  });
  var r = await sb.from('profiles').update(payload).eq('id', userId);
  if(r.error) throw r.error;
  return true;
}

async function adminSoftDeleteScheda(userId, schedaId){
  if(!sb) throw new Error('Supabase non disponibile');
  var now = Date.now();
  /* Aggiornamento del JSON `data` per propagare il tombstone anche nel campo che il client legge */
  var fetchRes = await sb.from('schede').select('data').eq('user_id', userId).eq('id', schedaId).maybeSingle();
  if(fetchRes.error) throw fetchRes.error;
  var newData = Object.assign({}, fetchRes.data && fetchRes.data.data || {}, {deleted:true, deletedAt:now, lastModified:now});
  var r = await sb.from('schede').update({
    deleted: true, deleted_at: now, last_modified: now, data: newData,
    updated_at: new Date().toISOString()
  }).eq('user_id', userId).eq('id', schedaId);
  if(r.error) throw r.error;
  return true;
}

async function adminSoftDeleteSession(userId, sessionId){
  if(!sb) throw new Error('Supabase non disponibile');
  var now = Date.now();
  var fetchRes = await sb.from('sessions').select('data').eq('user_id', userId).eq('id', sessionId).maybeSingle();
  if(fetchRes.error) throw fetchRes.error;
  var newData = Object.assign({}, fetchRes.data && fetchRes.data.data || {}, {deleted:true, deletedAt:now, lastModified:now});

    deleted: true, deleted_at: now, last_modified: now, data: newData,
    updated_at: new Date().toISOString()
  }).eq('user_id', userId).eq('id', sessionId);
  if(r.error) throw r.error;
  return true;
}

/* ── session helpers ── */
function makeSetSerie(setEs){
  return function(idx,si,field,val){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx)return ex;
        var newSerie=ex.serie.map(function(s,j){
          if(j!==si)return s;
          var u=Object.assign({},s);u[field]=parseFloat(val)||0;return u;
        });
        return Object.assign({},ex,{serie:newSerie});
      });
    });
  };
}
function makeAddSerie(setEs){
  return function(idx){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx)return ex;
        var last=ex.serie[ex.serie.length-1];
        var ns={n:ex.serie.length+1,peso:last?last.peso:0,reps:last?last.reps:10,ok:false,t:null};
        if(last && typeof last.durata !== 'undefined') ns.durata = last.durata;
        return Object.assign({},ex,{serie:ex.serie.concat([ns])});
      });
    });
  };
}
/* Rimuove la serie all'indice si dell'esercizio idx. Mantiene almeno 1 serie
   per non lasciare l'esercizio orfano (per cancellarlo del tutto serve il bottone Modifica). */
function makeRemoveSerie(setEs){
  return function(idx, si){
    setEs(function(prev){
      return prev.map(function(ex,i){
        if(i!==idx) return ex;
        if(!ex.serie || ex.serie.length <= 1) return ex;
        var newSerie = ex.serie.filter(function(_,j){return j!==si;})
          .map(function(s,k){return Object.assign({},s,{n:k+1});});
        return Object.assign({},ex,{serie:newSerie});
      });
    });
  };
}

/* ── cardio: tipi e metriche ──
   Ogni tipo cardio ha un set di campi consigliati. Tutti opzionali tranne durata.
   I dati live (durata, kcal, FC, distanza, ecc.) sono salvati come `cardioData` JSON

  {id:'camminata', label:'Camminata',     emoji:'🚶',   fields:['distanza','fcMedia','kcal']},

  {id:'mtb',       label:'Mountain bike', emoji:'🚵',   fields:['distanza','dislivello','kcal','fcMedia','fcMax','velMedia']},
  {id:'strada',    label:'Bici strada',   emoji:'🚴‍♂️', fields:['distanza','dislivello','kcal','fcMedia','fcMax','velMedia']},
  {id:'piscina',   label:'Piscina',       emoji:'🏊',   fields:['distanza','vasche','stile','lungVasca','kcal','fcMedia']},
  {id:'vogatore',  label:'Vogatore',      emoji:'🚣',   fields:['distanza','kcal','fcMedia','fcMax','watt']},
  {id:'ellittica', label:'Ellittica',     emoji:'⚙️',  fields:['distanza','kcal','fcMedia','fcMax']},
  {id:'scale',     label:'Step / Scale',  emoji:'🪜',   fields:['kcal','fcMedia','fcMax']},
  {id:'yoga',      label:'Yoga',          emoji:'🧘',   fields:['kcal']},
  {id:'pilates',   label:'Pilates',       emoji:'🧘‍♀️', fields:['kcal']},
  {id:'stretching',label:'Stretching',    emoji:'🤸‍♀️', fields:[]},
  {id:'hiit',      label:'HIIT / Circuit',emoji:'🔥',   fields:['kcal','fcMedia','fcMax']},
  {id:'altro',     label:'Altro',         emoji:'⏱️',  fields:['distanza','kcal','fcMedia','fcMax']}
];
function getCardioTipo(id){ return CARDIO_TIPI.find(function(t){return t.id===id;}) || CARDIO_TIPI[0]; }

/* ── cardio → muscle volume mapping ──
   Converte una sessione cardio in "set equivalenti" per gruppo muscolare, così le sessioni di
   spinning, bici, corsa ecc. contribuiscono al volume settimanale (e non lasciano "Gambe" a 0).
   La stima è grossolana ma onesta: usa la durata e l'intensità percepita (umore 1-5) come proxy.
   Per ogni tipo cardio definiamo:
     - muscoli: lista di {gr, minPerSet} — quanti minuti di lavoro = 1 set equivalente.
   Riferimenti: per ipertrofia il cardio NON sostituisce il lavoro coi pesi, ma per chi traccia
   l'attività complessiva ha senso che spinning/bici/corsa "contino" sulle gambe. I rapporti sono
   conservativi (es. 1 set leg = 6 min spinning a intensità media) basati su consenso pratico —
   l'utente può sempre integrare con lavoro pesi per stimolo ipertrofico mirato. */
var CARDIO_MUSCLE_MAP = {
  /* Pure leg cardio — bici-based */
  spinning:  [{gr:'Gambe', minPerSet:6}],
  cyclette:  [{gr:'Gambe', minPerSet:6}],
  mtb:       [{gr:'Gambe', minPerSet:6}],
  strada:    [{gr:'Gambe', minPerSet:6}],
  /* Running cardio — leg stimulus + meno specifico per ipertrofia */
  corsa:     [{gr:'Gambe', minPerSet:8}],
  tapis:     [{gr:'Gambe', minPerSet:8}],
  camminata: [{gr:'Gambe', minPerSet:12}],
  /* Step/scale — molto leg-intensive (glutei, polpacci) */
  scale:     [{gr:'Gambe', minPerSet:5}],
  /* Ellittica — gambe primarie + braccia secondarie */
  ellittica: [{gr:'Gambe', minPerSet:8}, {gr:'Braccia', minPerSet:18}],
  /* Vogatore — full body con focus posteriore */
  vogatore:  [{gr:'Schiena', minPerSet:6}, {gr:'Gambe', minPerSet:9}, {gr:'Braccia', minPerSet:12}],
  /* Piscina — full body, dipende dallo stile ma in media: dorso/spalle/gambe/core */
  piscina:   [{gr:'Schiena', minPerSet:7}, {gr:'Spalle', minPerSet:8}, {gr:'Gambe', minPerSet:10}, {gr:'Core', minPerSet:10}],
  /* HIIT — distribuito full body */
  hiit:      [{gr:'Gambe', minPerSet:7}, {gr:'Core', minPerSet:9}, {gr:'Petto', minPerSet:14}, {gr:'Spalle', minPerSet:14}],
  /* Yoga/Pilates — core e flessibilità */
  yoga:      [{gr:'Core', minPerSet:12}],
  pilates:   [{gr:'Core', minPerSet:9}],
  /* Stretching: 0 — solo recupero/mobilità */
  stretching:[],
  /* Altro — fallback generico leggero */
  altro:     [{gr:'Gambe', minPerSet:12}]
};

/* Fattore intensità da umore (1-5). L'umore è "come ti sei sentito" che usiamo come proxy:
   chi spinge forte di solito si sente "Ottimo 💪", chi va piano "Pessimo 😫" o "Neutro 😐". */
var CARDIO_INTENSITY_FACTOR = {1:0.6, 2:0.8, 3:1.0, 4:1.2, 5:1.4};

/* Calcola i set equivalenti per gruppo muscolare di una sessione cardio.
   Ritorna {gr1: setCount, gr2: setCount, ...} oppure {} se non applicabile.
   Non viene mai ritornato 0: se il calcolo dà <0.5 set il gruppo viene omesso (rumore). */
function cardioMuscleHits(s){
  if(!s || s.tipo !== 'cardio') return {};
  var map = CARDIO_MUSCLE_MAP[s.cardioTipo];
  if(!map || map.length===0) return {};
  var dur = parseInt(s.dur)||0;
  if(dur<=0) return {};
  var intensity = CARDIO_INTENSITY_FACTOR[s.umore||3] || 1.0;
  var hits = {};
  map.forEach(function(m){
    var sets = dur * intensity / m.minPerSet;
    if(sets >= 0.5) hits[m.gr] = Math.round(sets);
  });
  return hits;
}

/* ── AddPastSession: inserimento manuale di una sessione già fatta ──
   Per quando ti dimentichi di tracciare in tempo reale. Supporta pesi/cal/cardio

function AddPastSession(p){
  var go=p.go, onSave=p.onSave;

  var _d=useState(todayISO()); var data=_d[0]; var setData=_d[1];

  var _cv=useState({}); var cardioVals=_cv[0]; var setCardioVals=_cv[1];

  var _sav=useState(false); var saving=_sav[0]; var setSaving=_sav[1];

  function changeTipo(t){
    if(t===tipo) return;
    hap(8); setTipo(t);
    /* Svuotiamo gli esercizi se si passa da pesi a cal o viceversa (esercizi diversi) */
    if(t!=='cardio') setExercises([]);
  }
  function addExercise(nome){
    var skill = tipo==='cal' ? findCalSkill(nome) : null;
    var isHold = !!(skill && skill.type==='hold');
    setExercises(function(prev){
      return prev.concat([{
        id: uid(),
        nome: nome,
        gr: resolveGroup(nome),
        esTipo: 'standard',
        sets: 3,
        reps: isHold ? 0 : 8,
        durata: isHold ? 20 : 0,
        peso: 0,
        modalita: isHold ? 'hold' : 'reps',
        /* riscaldamento defaults */
        durataMin: 10,
        intensita: 'Media',
        /* superset: lista membri aggiuntivi (B, C, ...), ognuno con modalità indipendente */
        membri: []
      }]);
    });
    setPickerOpen(false);
  }
  function setMembroName(ei, mi, name){
    setExercises(function(prev){
      return prev.map(function(e,i){
        if(i!==ei) return e;
        var membri = (e.membri||[]).map(function(m,k){ return k!==mi ? m : Object.assign({},m,{nome:name, gr:resolveGroup(name)||m.gr||''}); });
        return Object.assign({},e,{membri:membri});
      });
    });
  }
  function setMembroField(ei, mi, field, val){
    setExercises(function(prev){
      return prev.map(function(e,i){
        if(i!==ei) return e;
        var membri = (e.membri||[]).map(function(m,k){ if(k!==mi) return m; var o=Object.assign({},m); o[field]=val; return o; });
        return Object.assign({},e,{membri:membri});

    });
  }
  function addMembro(ei){

      return prev.map(function(e,i){

        if(esTipo === 'superset' && ex.membri && ex.membri.length){

/* ── log / storico ── */
function Log(p){
  var sessions=p.sessions,schede=p.schede,go=p.go;
  var _s=useState('');var search=_s[0];var setSearch=_s[1];
  var _f=useState('all');var filter=_f[0];var setFilter=_f[1];

  /* Helper: nome esercizi presenti in una sessione (per la ricerca testo) */
  function sessionLabel(s){
    if(s.tipo==='cardio'){
      var ct = getCardioTipo(s.cardioTipo||'altro');
      return 'Cardio ' + ct.label;
    }
    var sc=schede.find(function(x){return x.id===s.sId;});
    var bl=sc&&sc.blocchi.find(function(b){return b.id===s.bId;});
    return (s.tipo==='cal'?'Calisthenics ':'') + (bl?bl.nome:sc?sc.nome:'Sessione');
  }
  function exerciseNames(s){
    return (s.es||[]).map(function(e){return e.nome||'';}).join(' ');
  }

  /* Applica filtri */
  var now = Date.now();
  var weekAgo = now - 7*86400000;
  var monthAgo = now - 30*86400000;
  var sorted = sessions.slice().sort(function(a,b){return new Date(b.t0)-new Date(a.t0);});
  var filtered = sorted.filter(function(s){
    if(filter==='pesi' && (s.tipo==='cal' || s.tipo==='cardio')) return false;
    if(filter==='cal'  && s.tipo!=='cal') return false;
    if(filter==='cardio' && s.tipo!=='cardio') return false;
    if(filter==='week' && new Date(s.t0).getTime() < weekAgo) return false;
    if(filter==='month'&& new Date(s.t0).getTime() < monthAgo) return false;
    if(search.trim()){
      var q = search.trim().toLowerCase();
      var hay = (sessionLabel(s) + ' ' + exerciseNames(s) + ' ' + (s.nota||'')).toLowerCase();
      if(hay.indexOf(q) < 0) return false;
    }
    return true;
  });

  /* Raggruppamento per settimana (chiave: lunedì della settimana) */
  function weekKey(date){
    var d = new Date(date);
    var day = d.getDay(); // 0=domenica
    var diff = day === 0 ? 6 : day - 1; // lunedì
    d.setDate(d.getDate() - diff);
    d.setHours(0,0,0,0);
    return d.toISOString().split('T')[0];
  }
  function weekLabel(key){
    var monday = new Date(key);
    var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    var fmt = function(dt){ return dt.toLocaleDateString('it-IT',{day:'numeric',month:'short'}); };
    var nowMonday = weekKey(new Date());
    if(key === nowMonday) return 'Questa settimana';
    var lastMonday = weekKey(new Date(Date.now() - 7*86400000));
    if(key === lastMonday) return 'Settimana scorsa';
    return fmt(monday) + ' – ' + fmt(sunday);
  }
  var groups = {};
  filtered.forEach(function(s){
    var k = weekKey(s.t0);
    if(!groups[k]) groups[k] = [];
    groups[k].push(s);
  });
  var groupKeys = Object.keys(groups).sort(function(a,b){return a<b?1:-1;});

  var filterPills = [
    ['all', 'Tutto'],
    ['pesi', 'Pesi'],
    ['cal', 'Cal'],
    ['cardio', 'Cardio'],
    ['week', '7g'],
    ['month', '30g']
  ];

  return h('div',{style:{padding:'24px 16px 100px'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:18}},
      h('div',{style:{flex:1,minWidth:0}},
        h(PageHeader,{title:'Il tuo Log',sub:sessions.length+' session'+(sessions.length===1?'e':'i')+' registrat'+(sessions.length===1?'a':'e')})
      ),
      h('button',{
        onClick:function(){hap(8);go('addpast');},
        'aria-label':'Aggiungi sessione passata',
        title:'Aggiungi una sessione che ti sei dimenticato di tracciare',
        style:{flexShrink:0,marginTop:8,display:'inline-flex',alignItems:'center',gap:6,padding:'8px 12px',background:ACC2,border:'1px solid '+ACC3,borderRadius:10,color:ACC,fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:'0.06em',textTransform:'uppercase',cursor:'pointer'}
      }, '+ Passata')
    ),

    /* Ricerca */
    sessions.length > 0 && h('div',{style:{marginBottom:10}},
      h('input',{
        type:'search',
        value: search,
        placeholder: 'Cerca sessione, esercizio o nota…',
        onChange: function(e){ setSearch(e.target.value); },
        style:{width:'100%',background:SURF2,border:'1px solid '+BORD,borderRadius:10,padding:'11px 14px',color:TEXT,fontSize:14}
      })
    ),

    /* Filtri */
    sessions.length > 0 && h('div',{style:{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}},
      filterPills.map(function(f){
        var on = filter === f[0];
        return h('button',{
          key: f[0],
          onClick: function(){ hap(8); setFilter(f[0]); },
          style:{padding:'7px 13px',borderRadius:20,border:'1px solid '+(on?ACC:BORD),background:on?ACC2:'transparent',color:on?ACC:MUTED,fontSize:12,cursor:'pointer',fontWeight:on?700:500,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:'0.04em',textTransform:'uppercase'}
        }, f[1]);
      })
    ),

    /* C7: Empty state caldo */
    sessions.length===0 && h('div',{style:{textAlign:'center',padding:'48px 24px',color:MUTED}},
      h('div',{style:{fontSize:54,marginBottom:14,opacity:0.6}},'📒'),
      h('div',{style:{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:'0.02em',color:TEXT,marginBottom:6}},'Il tuo log è vuoto'),
      h('div',{style:{fontSize:13,lineHeight:1.55,marginBottom:18}},'Ogni sessione che completi finisce qui — peso, serie, rep, tutto.',h('br'),'Il primo passo? Iniziare.'),
      h('button',{onClick:function(){go('start');},style:{padding:'12px 22px',background:ACC,color:ACT,border:'none',borderRadius:10,fontWeight:700,fontSize:14,cursor:'pointer',letterSpacing:'0.02em'}},'Logga il primo pump →'),
      h('div',{style:{marginTop:14,fontSize:12}},
        h('button',{onClick:function(){go('addpast');},style:{background:'none',border:'none',color:ACC,fontSize:12,fontWeight:600,cursor:'pointer',padding:0,textDecoration:'underline'}}, 'Oppure inserisci una sessione passata')
      )
    ),

    /* Sessioni filtrate: messaggio se i filtri non producono risultati */
    sessions.length > 0 && filtered.length === 0 && h('div',{style:{textAlign:'center',padding:'32px 16px',color:MUTED,fontSize:13}},
      'Nessun risultato per "',h('span',{style:{color:ACC}},search||filterPills.find(function(f){return f[0]===filter;})[1]),'"'
    ),

    /* Render raggruppato per settimana */
    groupKeys.map(function(gk){
      return h('div',{key:gk,style:{marginBottom:16}},
        h('div',{style:{fontSize:10,color:MUTED,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6,marginTop:4}},
          weekLabel(gk),
          h('span',{style:{marginLeft:6,opacity:0.65}}, '· ' + groups[gk].length)
        ),
        groups[gk].map(function(s){
          var isCardio = s.tipo === 'cardio';
          if(isCardio){
            var ct = getCardioTipo(s.cardioTipo||'altro');
            var cd = s.cardioData || {};
            /* KPI principale per la card: distanza se c'è, altrimenti kcal o solo durata */
            var mainKpi = '';
            if(cd.distanza) mainKpi = cd.distanza + 'km';
            else if(cd.kcal) mainKpi = cd.kcal + 'kcal';
            else mainKpi = s.dur + 'min';
            return h(Card,{key:s.id,onClick:function(){go('det',{s:s});},style:{borderLeft:'3px solid '+(s.umore>=4?'var(--success)':s.umore<=2?'var(--warning)':ACC)}},
              h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:2}},
                    h('span',{style:{fontSize:10,background:'rgba(0,240,255,0.10)',color:'#00F0FF',padding:'2px 7px',borderRadius:20,border:'1px solid rgba(0,240,255,0.3)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}},'CARDIO'),
                    h('span',{style:{fontSize:14}},ct.emoji),
                    h('div',{style:{fontWeight:500,fontSize:14}},ct.label)
                  ),
                  h('div',{style:{fontSize:11,color:MUTED}},new Date(s.t0).toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'})+' · '+s.dur+'min')
                ),
                h('div',{style:{textAlign:'right'}},
                  h('div',{style:{fontFamily:"'Roboto Mono',monospace",color:ACC,fontWeight:700,fontSize:14,fontVariantNumeric:'tabular-nums'}}, mainKpi)
                )

              h('div',{style:{fontSize:11,color:MUTED,display:'flex',gap:10,flexWrap:'wrap'}},
                [cd.kcal && (cd.kcal+' kcal'),
                 cd.fcMedia && ('FC ' + cd.fcMedia),

                 cd.vasche && (cd.vasche + ' vasche')
                ].filter(Boolean).map(function(t,i){return h('span',{key:i},t);})

            );
          }
          var sc=schede.find(function(x){return x.id===s.sId;});

          var isCal=s.tipo==='cal';
          var totalReps=expandSupersetEs(s.es).reduce(function(t,e){return t+(e.serie||[]).filter(function(sr){return sr.ok;}).reduce(function(a,sr){return a+(sr.reps||0);},0);},0);
